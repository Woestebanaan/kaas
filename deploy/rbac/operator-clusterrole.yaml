apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kaas-operator
rules:
  # Full CRD management
  - apiGroups: [kaas.rs]
    resources: [kafkatopics, kafkausers, kafkausergroups, kafkaacls]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [kaas.rs]
    resources: [kafkatopics/status, kafkausers/status, kafkausergroups/status, kafkaacls/status]
    verbs: [get, update, patch]
  # KafkaClusterAssignments — operator creates the singleton CR alongside the
  # KafkaCluster (one CR per KafkaCluster, sharing the cluster's name). The
  # controller broker writes the status; the operator only owns lifecycle.
  - apiGroups: [kaas.rs]
    resources: [kafkaclusterassignments]
    verbs: [get, list, watch, create, delete]
  # Secrets — own namespace only (enforced via RoleBinding)
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch, create, update, patch, delete]
  # Jobs for topic directory creation and deletion
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [get, list, watch, create, delete]
  # Inspect partition Leases
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, patch]
  # cert-manager integration (optional)
  - apiGroups: [cert-manager.io]
    resources: [certificaterequests]
    verbs: [get, list, watch, create, delete]
