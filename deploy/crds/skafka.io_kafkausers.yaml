---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: kafkausers.skafka.io
spec:
  group: skafka.io
  names:
    kind: KafkaUser
    listKind: KafkaUserList
    plural: kafkausers
    singular: kafkauser
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.authentication.type
      name: Auth type
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              authentication:
                properties:
                  certificateRef:
                    description: Used when type=tls
                    properties:
                      name:
                        type: string
                    required:
                    - name
                    type: object
                  password:
                    description: Used when type=scram-sha-512
                    properties:
                      key:
                        type: string
                      name:
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  scram:
                    description: |-
                      Scram is the runtime-rotation path for type=scram-sha-512 (gh #104,
                      KIP-554 AlterUserScramCredentials API). When set, the operator uses
                      the supplied (salt, storedKey, serverKey, iterations) verbatim and
                      skips the Password → PBKDF2 derivation. The wire-level admin path
                      computes these from the client-supplied SaltedPassword and patches
                      this field; clients receive the rotated credential via the same
                      AdminClient call that wrote it (Apache's model: the rotator knows
                      the new password locally and doesn't need a Secret to learn it).
                    properties:
                      iterations:
                        type: integer
                      salt:
                        type: string
                      serverKey:
                        type: string
                      storedKey:
                        type: string
                    required:
                    - iterations
                    - salt
                    - serverKey
                    - storedKey
                    type: object
                  serviceAccountRef:
                    description: Used when type=kubernetes-serviceaccount
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                    required:
                    - name
                    - namespace
                    type: object
                  type:
                    enum:
                    - scram-sha-512
                    - tls
                    - kubernetes-serviceaccount
                    type: string
                required:
                - type
                type: object
              authorization:
                description: |-
                  Authorization carries the user's ACL rules inline (Strimzi-style).
                  Pre-gh #135 ACLs lived in a separate KafkaAcl CR (and could also be
                  attached to a KafkaUserGroup that listed multiple members). Both
                  secondary CRs are removed in v0.1.117 — every rule that applies to
                  a principal is authored on the principal's own KafkaUser CR.
                properties:
                  acls:
                    items:
                      description: |-
                        KafkaUserACL is one access-control rule attached to this principal.
                        Field naming matches Strimzi exactly: `type: allow|deny` (lowercase),
                        optional `host`. Operations are validated against Apache Kafka's
                        standard set. Defaults applied at the operator boundary (acls.go
                        aclToEntry), not via apiserver +kubebuilder:default — see gh #137.
                      properties:
                        host:
                          description: |-
                            Source-IP filter. Empty means "any host" (the Apache Kafka
                            authorizer's "*" wildcard). Reserved for forward-compat with the
                            host filter; skafka enforces "any" only — non-empty values are
                            stored in the CR for round-trip but ignored at the broker today.
                          type: string
                        operations:
                          items:
                            type: string
                          minItems: 1
                          type: array
                        resource:
                          description: |-
                            KafkaUserACLResource identifies the Kafka resource the ACL applies to.
                            Same shape as the prior AclResource type; renamed for namespace
                            hygiene now that ACLs live inside KafkaUser. PatternType defaulting
                            happens operator-side (acls.go), not via apiserver defaulting — see
                            gh #137.
                          properties:
                            name:
                              type: string
                            patternType:
                              enum:
                              - literal
                              - prefix
                              type: string
                            type:
                              enum:
                              - topic
                              - group
                              - cluster
                              - transactionalId
                              type: string
                          required:
                          - name
                          - type
                          type: object
                        type:
                          enum:
                          - allow
                          - deny
                          type: string
                      required:
                      - operations
                      - resource
                      type: object
                    type: array
                  type:
                    enum:
                    - simple
                    type: string
                required:
                - acls
                type: object
              quotas:
                properties:
                  consumerMaxByteRatePerBroker:
                    description: |-
                      ConsumerMaxByteRatePerBroker caps consumer throughput at THIS broker
                      only (same per-broker semantics as the producer field).
                    format: int64
                    minimum: 0
                    type: integer
                  producerMaxByteRatePerBroker:
                    description: |-
                      ProducerMaxByteRatePerBroker caps producer throughput at THIS broker
                      only (Apache Kafka 3.7-style per-broker quota; KIP-13). With N brokers
                      the effective cluster-wide ceiling is N × the configured value.
                    format: int64
                    minimum: 0
                    type: integer
                  requestPercentage:
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                type: object
            required:
            - authentication
            type: object
          status:
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              secret:
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
