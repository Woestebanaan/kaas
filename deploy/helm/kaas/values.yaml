image:
  # The default repository is ghcr.io/woestebanaan/kaas, with a
  # "-preview" suffix appended automatically when the resolved tag is
  # a pre-release (contains "-"), mirroring the release workflow's
  # naming rule. An explicit repository overrides that derivation.
  repository: ""        # explicit value overrides the derived default
  tag: ""               # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

operator:
  enabled: true
  image:
    repository: ""      # explicit value overrides the derived default
    tag: ""
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # Pod-level securityContext mirrors the broker's defence-in-depth
  # perms (kaas#110). The operator mounts the SAME data PVC and writes
  # /data/__cluster/{credentials,acls}.json + per-topic dirs at reconcile
  # time, so it needs the same kubelet-fsGroup signal.
  #
  # No partition-init initContainer here (unlike the broker): the
  # operator's reconcile loop auto-retries on error, so when a fresh
  # cluster boots the operator before the broker's partition-init has
  # fixed perms, the operator's first few writes fail and the controller
  # backs off + retries until /data is writable. The broker's init
  # container is the floor that eventually unblocks it on NFS / non-
  # cooperating CSI; on cooperating CSI the kubelet-fsGroup chown
  # happens before the operator container starts.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 0
    fsGroup: 0
    fsGroupChangePolicy: OnRootMismatch

broker:
  replicaCount: 3
  clusterID: kaas-local
  # gh #208 mitigation. During a rolling update the StatefulSet must
  # observe a pod continuously Ready for this many seconds before it
  # proceeds to the next pod. Today /readyz flips at listener-bind
  # (~20 ms), well before the pod has taken over its assigned
  # partitions, so without this the controller kills pod N+1 while
  # pod N is still recovering — two brokers effectively out at once.
  #
  # Because the (dishonest) readiness lands the pod in the alive set
  # immediately, the pod DOES get assigned and take over during this
  # window — so the wait is what actually lets takeover finish before
  # the next pod dies. A readiness flap (e.g. the probe timing out
  # under takeover load) resets the timer, which is the intended
  # behaviour. This is a mitigation, not the fix: honest readiness
  # gated on takeover completion is the real work (gh #208).
  #
  # 60 s covers takeover of a normal partition set on healthy storage.
  # Raise it on slow shared storage where recovery scans take longer.
  minReadySeconds: 60
  ports:
    kafka: 9092
    tls: 9093
    health: 8080
    # Internal-only gRPC heartbeat between brokers and the elected
    # cluster controller (Phase 4/5). Not exposed externally; the
    # headless service routes this so peers can dial each other.
    heartbeat: 9094
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi
  # Pod-level securityContext. Defence-in-depth permission handling for
  # the shared data PVC (kaas#110): two independent mechanisms both
  # land /data writable for the broker process.
  #
  #   1. Strimzi-modern path (works on cooperating CSI drivers).
  #      runAsGroup=0 + fsGroup=0 + image-default UID 65532. Mirrors
  #      Strimzi's "primary GID 0" Dockerfile convention. On any CSI
  #      driver that honours fsGroup (block-mode CSI, EBS, local-path),
  #      kubelet recursively chowns the volume to root group 0 with
  #      mode 02775, and the broker — running as 65532:0 — has
  #      group-write without further help.
  #
  #   2. Init-container floor (works regardless of CSI cooperation).
  #      partition-init runs as uid 0 (see broker-statefulset.yaml) and
  #      chowns -R /data to 65532:0 + chmods /data to 0775 before
  #      exiting. This is the path that matters on shared NFS RWX
  #      where most CSI drivers set fsGroupPolicy=None and the kubelet
  #      skips the chown entirely.
  #
  # fsGroupChangePolicy=OnRootMismatch is the perf-friendly default for
  # the kubelet path — when it would be a no-op we don't pay the
  # recursive-walk cost. The init container always runs and is cheap on
  # warm restart (chown of already-correct ownership is fast).
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 0
    fsGroup: 0
    fsGroupChangePolicy: OnRootMismatch
  readinessGate:
    # Adds the kaas.rs/PartitionsReady readinessGate to broker pods. Required
    # whenever the broker's ReadinessUpdater is expected to gate Endpoints
    # membership on initial partition acquisition. Disable for bare-bones smoke
    # tests where you just want the pod Ready as soon as the listener is up.
    enabled: true

  # v3 cluster-controller Lease (Phase 4). One Lease per cluster; the
  # winning broker runs the AssignmentLoop + heartbeat gRPC server.
  # Tighter durations = faster failover, more etcd writes; defaults match
  # the Kubernetes client's recommended renew/retry ratios.
  controllerLease:
    durationSeconds: 15      # KAAS_CONTROLLER_LEASE_DURATION_SECONDS
    renewDeadlineSeconds: 10 # KAAS_CONTROLLER_RENEW_DEADLINE_SECONDS
    retryPeriodSeconds: 2    # KAAS_CONTROLLER_RETRY_PERIOD_SECONDS

  # Durability dial. Mirrors Apache Kafka's log.flush.interval.messages.
  #   1   (default) — fsync after every record. Honest acks=all semantics.
  #               No data loss on crash with acks>=1, at the cost of one
  #               fsync round-trip per Produce.
  #   N>1         — fsync only every N records per partition. On crash, the
  #               last (up to) N-1 records on each partition can be lost.
  #               Acceptable when acks=1 producers tolerate it, or the
  #               storage substrate's write cache is power-fail safe.
  #   0           — disable message-driven flushing entirely. Fsync only
  #               at segment roll. Maximum throughput, weakest durability.
  flushIntervalMessages: 1

  # gh #108: TxnStateStore slot count. Pinned to a cluster-wide
  # constant independent of replicaCount — mirrors Apache's
  # transaction.state.log.num.partitions=50 default. Scale ops change
  # which broker owns each slot (via gh #91 hash routing); slot files
  # remain valid. Strimzi's Kafka CR exposes the same knob via
  # spec.kafka.config and treats it as bootstrap-once; kaas treats
  # changes as triggering a re-shard pass (idempotent on startup).
  # If you change this on a live cluster, drain transactional
  # producers first to avoid losing in-flight (PID, epoch) state
  # during the rolling upgrade window.
  txnState:
    numSlots: 50

  # gh #109: auto.create.topics.enable.
  #   enabled — default true, matches Apache 3.7. When a producer sends
  #     MetadataRequest with AllowAutoTopicCreation=true for an unknown
  #     topic, the broker writes a KafkaTopic CR (operator reconciles
  #     into partition dirs) and returns LEADER_NOT_AVAILABLE so the
  #     client retries. Required for Kafka Streams' DSL `.to(<sink>)`
  #     to work without explicit AdminClient.createTopics. Disable to
  #     force every topic to be pre-created via KafkaTopic CR.
  #   numPartitions — default 1; partition count for auto-created
  #     topics. Topics created via explicit AdminClient.createTopics
  #     (or KafkaTopic CR with spec.partitions) ignore this.
  autoCreateTopics:
    enabled: true
    numPartitions: 1

storage:
  className: ceph-filesystem    # or nfs-csi
  size: 500Gi
  accessMode: ReadWriteMany
  mountPath: /data
  # gh #221 phase 1: dedicated control-plane volume. Cluster-wide
  # coordination state (assignment.json, txn slots, consumer offsets,
  # credentials/ACLs, fence + marker queues, producer-id blocks) moves
  # to its own small RWX volume, so a runaway topic filling the data
  # volume degrades into a per-topic produce error instead of taking
  # the whole control plane down.
  #
  # Enabling this on an EXISTING cluster is a migration: scale the
  # brokers and operator down, copy /data/__cluster/* onto the new
  # volume's root, then upgrade with enabled=true. (Consumer offsets
  # under __cluster/__consumer_offsets are adopted automatically; the
  # rest of the state is not.)
  controlPlane:
    enabled: false
    className: ""               # "" → same class as storage.className
    size: 1Gi
    accessMode: ReadWriteMany
    mountPath: /cluster
  # gh #221 phase 2: named pool log dirs (Kafka KIP-113 vocabulary —
  # one pool volume = one log dir). Each member is its own RWX PVC,
  # mounted on every broker at /vols/<name> and advertised to broker
  # + operator as KAAS_LOG_DIRS. Topics choose members via
  # `KafkaTopic.spec.storage.volumes`; members with
  # defaultEligible: false are reserved — they only receive topics
  # that name them explicitly. Placement is creation-sticky; editing
  # a topic's binding never moves existing partitions.
  #
  # pool:
  #   - name: fast
  #     size: 100Gi
  #     className: ""           # "" → storage.className
  #     accessMode: ReadWriteMany
  #     defaultEligible: true
  #   - name: premium
  #     size: 50Gi
  #     className: premium-nfs
  #     defaultEligible: false
  pool: []

auth:
  # When false, the broker uses an AllowAllAuthEngine (no authentication,
  # ANONYMOUS principal for every connection). When true (default), the
  # RealAuthEngine reads credentials.json and acls.json from the shared
  # PVC. Translates to KAAS_AUTH_DISABLED env var on the broker.
  enabled: true
  mechanisms:
    - SCRAM-SHA-512
  # When true, the dispatcher rejects non-ApiVersions/SaslHandshake/SaslAuthenticate
  # requests from connections that haven't completed SASL — closes the
  # "anonymous fallthrough" hole. Translates to KAAS_REQUIRE_SASL.
  requireSasl: false
  tls:
    enabled: false
    existingSecret: ""          # Secret with tls.crt + tls.key
    certManagerIssuer: ""

admin:
  # Optional ArgoCD integration for admin-protocol-created CRs
  # (gh #84 + gh #106). When AdminClient.createTopics / kafka-
  # topics.sh / Kafbat-UI creates a topic, kaas writes a KafkaTopic
  # CR via TopicCRWriter — but those CRs aren't in git, so a vanilla
  # ArgoCD Application either deletes them on the next selfHeal sync
  # or sits OutOfSync forever.
  #
  # When `enabled: true`, runtime-created CRs are stamped with:
  #   - argocd.argoproj.io/tracking-id: <app>:kaas.rs/<kind>:<ns>/<name>
  #     (claims the CR as part of the named Application — visible
  #     in the UI tree alongside the git-managed CRs)
  #   - argocd.argoproj.io/compare-options: <compareOptions>
  #     (default IgnoreExtraneous — no drift, no prune)
  #
  # `applicationName` defaults to the Helm release name (typically
  # "kaas"), so the typical setup is just `enabled: true`. Override
  # only if your ArgoCD Application name differs from the release.
  #
  # `compareOptions` accepts ArgoCD's compare-options string (see
  # https://argo-cd.readthedocs.io/en/stable/user-guide/compare-options/);
  # set to "" to skip that annotation entirely while keeping
  # tracking-id (use case: surface runtime-created topics as
  # deliberate drift in ArgoCD's UI as an alert).
  #
  # `syncOptions` accepts ArgoCD's sync-options string (see
  # https://argo-cd.readthedocs.io/en/stable/user-guide/sync-options/).
  # Default "Delete=false" — production safety: a runtime-created
  # topic survives `kubectl delete application kaas`, so a typo or
  # an operator-driven Application teardown doesn't cascade-delete
  # every Kafbat-/AdminClient-created topic. Common alternatives:
  #   - ""                         — runtime topics cascade-delete
  #     with the parent Application (no safety net)
  #   - "Prune=false"              — show as drift in UI, never prune
  #   - "Prune=false,Delete=false" — both: surfaced as drift AND
  #     survive Application delete
  # The string is passed through verbatim; kaas doesn't validate.
  #
  # `enabled: false` (the default) produces plain CRs with no
  # argocd.argoproj.io/* annotations — non-ArgoCD installs get
  # nothing extra in the CR metadata.
  argocd:
    enabled: false
    applicationName: ""
    compareOptions: "IgnoreExtraneous"
    syncOptions: "Delete=false"

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

serviceAccount:
  broker:
    create: true
    name: ""
  operator:
    create: true
    name: ""

autoscaling:
  enabled: false
  minReplicas: 3
  maxReplicas: 10
  targetConsumerLagMessages: 100000

observability:
  # OTLP push exporters. Each signal is gated independently — metrics push to
  # Prometheus's native OTLP/HTTP receiver; traces push to an OTel Collector
  # over OTLP/gRPC.
  otlp:
    metrics:
      enabled: false
      # Full URL to Prometheus's OTLP receiver (requires
      # --web.enable-otlp-receiver). Path must end in /v1/metrics.
      endpoint: "http://prometheus.observability.svc.cluster.local:9090/api/v1/otlp/v1/metrics"
      # gh #133: how often the broker pushes metrics to the OTLP endpoint.
      # The SDK default is 60s, which means typical Grafana stat panels
      # using rate([1m]) get only one sample per window and show
      # "no data" — rate() needs ≥2 samples. 30s ensures rate([60s])
      # always sees 2+ samples. Increase if metric volume is a problem;
      # decrease (e.g. "15s") for higher-resolution dashboards.
      # Accepts duration strings like "15s", "1m".
      exportInterval: "30s"
    traces:
      enabled: false
      # host:port (gRPC); a scheme prefix is stripped automatically.
      # Default targets a Tempo deployment at observability/tempo:4317.
      # Switch to "otel-collector.observability.svc.cluster.local:4317"
      # if you front Tempo with the OTel Collector.
      endpoint: "tempo.observability.svc.cluster.local:4317"
      insecure: true
      # 0.0 = off; 1.0 = every trace. Production default 0.1; bump to
      # 1.0 in dev / when actively debugging.
      samplerRatio: 0.1

  logs:
    level: info        # debug|info|warn|error
    format: json       # json|text

  # Prometheus Operator PrometheusRule for the load-bearing kaas alerts
  # (byte-opacity tripwires, self-fence, stale assignments, etc.).
  # Off by default — opt in only if Prometheus Operator is installed and
  # routes PrometheusRule resources from this namespace.
  alerts:
    enabled: false
    # Extra labels merged into every rule's labels block (useful for
    # routing in Alertmanager — e.g. team: data-platform).
    additionalLabels: {}
    # Override individual alert thresholds. Each key maps to a value
    # that's substituted into the rule expression / for clause.
    thresholds:
      # Heartbeat RTT p99 above this for 5m → warning.
      heartbeatRttP99Seconds: 0.5
      # Self-fence events in 1m above this → warning.
      selfFencePerMinute: 1
      # assignment.json size in bytes — warning above this, critical past 900KB.
      assignmentFileSizeWarnBytes: 524288
      # Stale assignments rejected in 1m above this → warning. Sustained
      # non-zero is the signal a partitioned ex-controller is still alive.
      staleAssignmentsPerMinute: 1

# gh #126: Strimzi-style listeners array. Each entry is one TCP
# listener on every broker pod, described by three orthogonal axes:
#
#   - `type`: "internal" or "external". Internal listeners are
#     reachable via the headless Service DNS; external listeners
#     get per-broker FQDNs + cert-manager Certificate + TLSRoute
#     plumbing for off-cluster clients.
#   - `tls`: false or true. Independent of authentication —
#     `tls: true, authentication.type: none` is "opportunistic
#     TLS" (encrypted, anonymous principal).
#   - `authentication.type`: "none" (ANONYMOUS principal) /
#     "scram-sha-512" (SASL/SCRAM, RealAuthEngine wired) /
#     "mtls" (requires tls: true; broker extracts CN as principal)
#     / "plain" (SASL/PLAIN against the ServiceAccount JWT path).
#
# `mtls` requires `tls: true`; every other combination is legal.
# Names are user-chosen strings; they appear in
# ConnState.Listener and become keys in the per-listener auth
# engine map. Duplicate names or duplicate ports fail at boot
# with a clear validator error.
#
# The "external" listener entry (when enabled) also drives operator-
# side reconciliation of cert-manager Certificate, per-broker
# Service, and TLSRoute resources. Today only the FIRST `type:
# external` entry is consumed for that machinery; widening to N is
# tracked separately as a follow-up.
listeners:
  - name: plain
    # Plaintext in-cluster listener. Use the per-broker headless DNS
    # to reach it: `<pod>.<headlessSvc>.<ns>.svc.<clusterDomain>:9092`.
    # Anonymous + no ACL evaluation (anonymous listeners short-circuit
    # the cluster authorizer's ACL path — only quotas run, and they're
    # no-ops for User:ANONYMOUS).
    port: 9092
    type: internal
    tls: false
    authentication:
      type: none

  - name: external
    # External listener is opt-in. When disabled, no Certificate /
    # per-broker Service / TLSRoute is created; off-cluster clients
    # cannot reach the broker.
    enabled: false
    port: 9093
    type: external
    tls: true
    # fmt-style pattern substituted with the broker ordinal.
    # Example: "broker-%d.kafka.example.com" → broker-0..., etc.
    hostnamePattern: "broker-%d.kafka.example.com"
    # Optional convenience hostname (e.g. a CNAME to broker-0).
    # Added to the certificate SANs so clients can use a single
    # bootstrap address.
    bootstrapHostname: ""
    certManager:
      enabled: true
      issuerRef:
        name: letsencrypt-prod
        kind: ClusterIssuer
    # Mutual TLS: when enabled the broker requires every TLS client
    # to present a cert signed by one of the CAs in `existingSecret`.
    # Pair with `authentication.type: mtls` for hard mTLS auth.
    clientCA:
      enabled: false
      existingSecret: ""
      key: ca.crt
    gateway:
      # Create one TLSRoute per broker when true. Requires Gateway API
      # CRDs + a Gateway with a TLS passthrough listener on the external
      # port. If false, per-broker Services are still created and can be
      # fronted by per-broker LoadBalancer Services instead.
      enabled: true
      gatewayRef:
        name: kaas-gateway
        namespace: kafka
    service:
      annotations: {}
    # "none" = opportunistic TLS (anonymous principal on this
    # listener despite the encrypted channel). Set to "mtls" for
    # hard authentication via client cert CN, or "scram-sha-512"
    # for SASL_SSL.
    authentication:
      type: none

  - name: authed
    # Plaintext + SASL-required listener for in-cluster workloads
    # that should authenticate. The dispatcher rejects pre-SASL
    # APIs on this listener until SCRAM completes.
    enabled: false
    port: 9095
    type: internal
    tls: false
    authentication:
      type: scram-sha-512

# gh #97: cluster DNS suffix used to build per-broker FQDNs the
# broker advertises in MetadataResponse for internal-type
# listeners. Default works for >99% of k8s distros (kubeadm / k3s
# / EKS / GKE / AKS); override only if your cluster's CoreDNS uses
# a non-default domain. Moved to top level in v0.1.126+ (gh #126);
# it applies to every internal-type listener, not just the first.
clusterDomain: cluster.local

# gh #126: Strimzi-style cluster-wide authorization. Applies to
# every listener (authentication remains per-listener). When type
# is unset or empty, no authorization is enforced — matches
# Strimzi's "missing authorization property = no restrictions".
#
# Supported types (v0.1.126+): "simple" (ACL-based via the
# operator-managed acls.json). OAuth / OPA / custom backends are
# tracked separately and slot into the same Authorizer interface
# without further refactor.
#
# `superUsers` is a list of principal names that bypass ACL
# evaluation entirely (early-allow). Match verbatim against
# Principal.Name — use `CN=foo` for mTLS subjects and bare names
# for SCRAM principals. Useful for operator-internal accounts and
# break-glass.
authorization:
  type: ""           # "" | "simple"
  superUsers: []
  #
  # Example:
  #   type: simple
  #   superUsers:
  #     - alice
  #     - CN=operator
