{{- if and .Values.operator.enabled .Values.serviceAccount.operator.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kaas.operatorSAName" . }}
  labels: {{- include "kaas.operatorLabels" . | nindent 4 }}
{{- end }}
{{- if .Values.operator.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kaas.fullname" . }}-operator
  labels: {{- include "kaas.operatorLabels" . | nindent 4 }}
rules:
  # gh #135: kafkaacls + kafkausergroups CRs removed. ACLs now live
  # inline on KafkaUser.spec.authorization (Strimzi-style).
  - apiGroups: [kaas.rs]
    resources: [kafkatopics, kafkausers, kafkaclusters, kafkaclusterassignments]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [kaas.rs]
    resources:
      - kafkatopics/status
      - kafkausers/status
      - kafkaclusters/status
      - kafkaclusterassignments/status
      - kafkatopics/finalizers
      - kafkausers/finalizers
      - kafkaclusters/finalizers
    verbs: [get, update, patch]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    # `create` + `update` needed by the operator's
    # `KubeLeaseElection::acquire` — it creates a Lease when none
    # exists and updates it on every renew tick.
    verbs: [get, list, watch, create, update, patch]
  # KafkaCluster controller reconciles Services and Gateway API / cert-manager resources.
  - apiGroups: [""]
    resources: [services]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [cert-manager.io]
    resources: [certificates]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [gateway.networking.k8s.io]
    resources: [tlsroutes]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kaas.fullname" . }}-operator
  labels: {{- include "kaas.operatorLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kaas.fullname" . }}-operator
subjects:
  - kind: ServiceAccount
    name: {{ include "kaas.operatorSAName" . }}
    namespace: {{ .Release.Namespace }}
---
# Own-namespace Role: Secrets CRUD for output credentials.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kaas.fullname" . }}-operator
  labels: {{- include "kaas.operatorLabels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kaas.fullname" . }}-operator
  labels: {{- include "kaas.operatorLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kaas.fullname" . }}-operator
subjects:
  - kind: ServiceAccount
    name: {{ include "kaas.operatorSAName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
