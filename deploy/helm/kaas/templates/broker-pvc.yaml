apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "kaas.pvcName" . }}
  labels: {{- include "kaas.labels" . | nindent 4 }}
  annotations:
    # Never auto-delete on helm uninstall — this volume holds cluster data.
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - {{ .Values.storage.accessMode }}
  storageClassName: {{ .Values.storage.className }}
  resources:
    requests:
      storage: {{ .Values.storage.size }}
{{- if .Values.storage.controlPlane.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "kaas.controlPlanePvcName" . }}
  labels: {{- include "kaas.labels" . | nindent 4 }}
  annotations:
    # Holds assignment/txn/offset/credential state — never auto-delete.
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - {{ .Values.storage.controlPlane.accessMode }}
  storageClassName: {{ .Values.storage.controlPlane.className | default .Values.storage.className }}
  resources:
    requests:
      storage: {{ .Values.storage.controlPlane.size }}
{{- end }}
{{- range .Values.storage.pool }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "kaas.poolPvcName" (dict "ctx" $ "name" .name) }}
  labels: {{- include "kaas.labels" $ | nindent 4 }}
  annotations:
    # Pool log dir — holds topic data; never auto-delete.
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - {{ .accessMode | default "ReadWriteMany" }}
  storageClassName: {{ .className | default $.Values.storage.className }}
  resources:
    requests:
      storage: {{ .size }}
{{- end }}
