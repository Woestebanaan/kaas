{{- if .Values.operator.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kaas.fullname" . }}-operator
  labels: {{- include "kaas.operatorLabels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: {{- include "kaas.operatorSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "kaas.operatorSelectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "kaas.operatorSAName" . }}
      {{- with .Values.operator.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: operator
          image: {{ include "kaas.operatorImage" . }}
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          env:
            - name: KAAS_DATA_DIR
              value: {{ .Values.storage.mountPath }}
            {{- if .Values.storage.controlPlane.enabled }}
            - name: KAAS_CLUSTER_DIR
              value: {{ .Values.storage.controlPlane.mountPath }}
            {{- end }}
            {{- if .Values.storage.pool }}
            - name: KAAS_LOG_DIRS
              value: {{ include "kaas.logDirsJSON" . | quote }}
            {{- end }}
            - name: KAAS_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: KAAS_LOG_LEVEL
              value: {{ .Values.observability.logs.level | quote }}
            - name: KAAS_LOG_FORMAT
              value: {{ .Values.observability.logs.format | quote }}
            {{- if .Values.observability.otlp.metrics.enabled }}
            - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
              value: {{ .Values.observability.otlp.metrics.endpoint | quote }}
            - name: KAAS_METRIC_EXPORT_INTERVAL
              value: {{ .Values.observability.otlp.metrics.exportInterval | quote }}
            {{- end }}
            {{- if .Values.observability.otlp.traces.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otlp.traces.endpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "{{ .Values.observability.otlp.traces.insecure }}"
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "{{ .Values.observability.otlp.traces.samplerRatio }}"
            {{- end }}
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          volumeMounts:
            - name: data
              mountPath: {{ .Values.storage.mountPath }}
            {{- if .Values.storage.controlPlane.enabled }}
            - name: cluster-state
              mountPath: {{ .Values.storage.controlPlane.mountPath }}
            {{- end }}
            {{- range .Values.storage.pool }}
            - name: pool-{{ .name }}
              mountPath: /vols/{{ .name }}
            {{- end }}
          resources: {{- toYaml .Values.operator.resources | nindent 12 }}
      volumes:
        # Operator mounts the SAME PVCs as the brokers.
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "kaas.pvcName" . }}
        {{- if .Values.storage.controlPlane.enabled }}
        - name: cluster-state
          persistentVolumeClaim:
            claimName: {{ include "kaas.controlPlanePvcName" . }}
        {{- end }}
        {{- range .Values.storage.pool }}
        - name: pool-{{ .name }}
          persistentVolumeClaim:
            claimName: {{ include "kaas.poolPvcName" (dict "ctx" $ "name" .name) }}
        {{- end }}
{{- end }}
