apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "kaas.fullname" . }}
  labels: {{- include "kaas.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.broker.replicaCount }}
  serviceName: {{ include "kaas.headlessName" . }}
  # All brokers are identical — no startup ordering needed.
  podManagementPolicy: Parallel
  # gh #208: pace rolling updates so the controller doesn't replace the
  # next broker before this one has actually taken over its partitions.
  # /readyz currently flips at listener-bind, so this wait is what gives
  # takeover time to complete. Mitigation, not the honest-readiness fix.
  {{- with .Values.broker.minReadySeconds }}
  minReadySeconds: {{ . }}
  {{- end }}
  selector:
    matchLabels: {{- include "kaas.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "kaas.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "kaas.brokerSAName" . }}
      {{- with .Values.broker.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.broker.readinessGate.enabled }}
      # Pod only joins the headless service after all partition leases are held.
      readinessGates:
        - conditionType: "kaas.rs/PartitionsReady"
      {{- end }}
      initContainers:
        - name: partition-init
          image: {{ include "kaas.brokerImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--init"]
          # Run as root so we can chown the data dir to the broker uid/gid
          # before exiting (kaas#110). When the PVC comes back as
          # root-owned and fsGroupChangePolicy=OnRootMismatch silently skips
          # the recursive perm fix, the broker container (uid 65532) can't
          # mkdir new topic dirs at runtime. The init container's chown is
          # idempotent on warm restarts and mirrors Strimzi's volume-mount-
          # hack pattern. The broker container itself still runs as 65532
          # under the pod-level securityContext.
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
          env:
            - name: KAAS_DATA_DIR
              value: {{ .Values.storage.mountPath }}
            {{- if .Values.storage.controlPlane.enabled }}
            - name: KAAS_CLUSTER_DIR
              value: {{ .Values.storage.controlPlane.mountPath }}
            {{- end }}
            - name: KAAS_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Templated from podSecurityContext directly. Don't add `| default`
            # here — sprig's `default` treats 0 as empty, which would silently
            # rewrite runAsGroup=0 (Strimzi-modern primary-GID-0 convention)
            # back to 65532 and break the kubelet-fsGroup path.
            - name: KAAS_BROKER_UID
              value: "{{ .Values.broker.podSecurityContext.runAsUser }}"
            - name: KAAS_BROKER_GID
              value: "{{ .Values.broker.podSecurityContext.runAsGroup }}"
          volumeMounts:
            - name: data
              mountPath: {{ .Values.storage.mountPath }}
            {{- if .Values.storage.controlPlane.enabled }}
            - name: cluster-state
              mountPath: {{ .Values.storage.controlPlane.mountPath }}
            {{- end }}
      containers:
        - name: broker
          image: {{ include "kaas.brokerImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
          {{- /* gh #126: one containerPort per enabled listener. */}}
          {{- range .Values.listeners }}
            {{- if or (not (hasKey . "enabled")) .enabled }}
            - name: kafka-{{ .name }}
              containerPort: {{ .port }}
            {{- end }}
          {{- end }}
            - name: health
              containerPort: {{ .Values.broker.ports.health }}
            - name: heartbeat
              containerPort: {{ .Values.broker.ports.heartbeat }}
          env:
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: KAAS_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: KAAS_HEADLESS_SVC
              value: {{ include "kaas.headlessName" . }}
            # gh #128: pod-name pattern for the StatefulSet's pods —
            # used together with KAAS_HEADLESS_SVC to build the
            # Strimzi-style headless per-pod DNS name (e.g.
            # `kaas-0.kaas.<ns>.svc.<domain>`) that the broker
            # advertises in MetadataResponse. Pre-gh #128 a per-broker
            # ClusterIP Service backed each advertised FQDN; that
            # collided with the operator's external-listener reconciler
            # and caused an ArgoCD drift loop. K8s synthesizes the
            # per-pod A record from the StatefulSet + headless Service
            # pair, so no extra Service object is needed for internal
            # traffic.
            - name: KAAS_POD_NAME_PATTERN
              value: "{{ include "kaas.fullname" . }}-%d"
            - name: KAAS_CLUSTER_DOMAIN
              value: {{ .Values.clusterDomain | default "cluster.local" }}
            - name: KAAS_DATA_DIR
              value: {{ .Values.storage.mountPath }}
            {{- if .Values.storage.controlPlane.enabled }}
            - name: KAAS_CLUSTER_DIR
              value: {{ .Values.storage.controlPlane.mountPath }}
            {{- end }}
            - name: KAAS_CLUSTER_ID
              value: {{ .Values.broker.clusterID }}
            - name: KAAS_CLUSTER_NAME
              # Matches the KafkaCluster CR's metadata.name so the
              # KafkaClusterAssignments CR mirror writes back to the
              # right object (Phase 6).
              value: {{ include "kaas.fullname" . }}
            - name: KAAS_PORT
              value: "{{ .Values.broker.ports.kafka }}"
            - name: KAAS_HEALTH_ADDR
              value: ":{{ .Values.broker.ports.health }}"
            - name: KAAS_CONTROLLER_HEARTBEAT_ADDR
              value: "0.0.0.0:{{ .Values.broker.ports.heartbeat }}"
            - name: KAAS_PEER_HEARTBEAT_PORT
              value: "{{ .Values.broker.ports.heartbeat }}"
            - name: KAAS_CONTROLLER_LEASE_DURATION_SECONDS
              value: "{{ .Values.broker.controllerLease.durationSeconds }}"
            - name: KAAS_CONTROLLER_RENEW_DEADLINE_SECONDS
              value: "{{ .Values.broker.controllerLease.renewDeadlineSeconds }}"
            - name: KAAS_CONTROLLER_RETRY_PERIOD_SECONDS
              value: "{{ .Values.broker.controllerLease.retryPeriodSeconds }}"
            - name: KAAS_FLUSH_INTERVAL_MESSAGES
              value: "{{ .Values.broker.flushIntervalMessages | default 1 }}"
            {{- if .Values.broker.pprof }}
            # gh #132: pprof on the health server's mux at /debug/pprof/.
            # Enables block + mutex profiling at full sample rate — only
            # flip this on for short-lived investigations; the runtime
            # overhead is observable.
            - name: KAAS_PPROF
              value: "true"
            {{- end }}
            # gh #108 (refactored v0.1.84): numSlots for the sharded
            # TxnStateStore is decoupled from the StatefulSet replica
            # count and pinned to a fixed cluster-wide constant —
            # mirrors Apache's transaction.state.log.num.partitions=50
            # default. Scale ops change which broker owns each slot
            # (gh #91 hash routing) but every slot file remains
            # valid. Set ONCE at cluster bootstrap; later changes
            # trigger a re-shard pass on every broker startup
            # (idempotent, but lossy under heavy concurrent writes
            # during a rolling upgrade — drain transactional
            # producers first if changing).
            - name: KAAS_TXN_NUM_SLOTS
              value: "{{ .Values.broker.txnState.numSlots }}"
            # gh #109: auto.create.topics.enable (default true, matches
            # Apache 3.7). When the broker receives MetadataRequest for
            # an unknown topic with AllowAutoTopicCreation=true, it
            # writes a KafkaTopic CR via TopicCRWriter and returns
            # LEADER_NOT_AVAILABLE so the client retries. Internal
            # topics (`__` prefix) are reserved.
            - name: KAAS_AUTO_CREATE_TOPICS_ENABLE
              value: "{{ .Values.broker.autoCreateTopics.enabled }}"
            - name: KAAS_NUM_PARTITIONS
              value: "{{ .Values.broker.autoCreateTopics.numPartitions }}"
            {{- if .Values.auth.requireSasl }}
            - name: KAAS_REQUIRE_SASL
              value: "true"
            {{- end }}
            {{- if not .Values.auth.enabled }}
            - name: KAAS_AUTH_DISABLED
              value: "true"
            {{- end }}
            - name: KAAS_LOG_LEVEL
              value: {{ .Values.observability.logs.level | quote }}
            - name: KAAS_LOG_FORMAT
              value: {{ .Values.observability.logs.format | quote }}
            {{- if .Values.observability.otlp.metrics.enabled }}
            - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
              value: {{ .Values.observability.otlp.metrics.endpoint | quote }}
            # gh #133: explicit push interval. Defaults to the value
            # set in values.yaml (30s). Override here without touching
            # the broker binary — accepts duration strings like
            # "15s", "1m". The SDK default would be 60s; at
            # that cadence rate([1m]) windows often see only one
            # sample and Grafana stat panels show "no data".
            #
            # Kaas-specific env name (not OTEL_METRIC_EXPORT_INTERVAL):
            # the OTel spec value is bare-int milliseconds, and the SDK
            # logs an Atoi error on every boot when it sees a duration
            # string. Using KAAS_* keeps that env out of the SDK's path.
            - name: KAAS_METRIC_EXPORT_INTERVAL
              value: {{ .Values.observability.otlp.metrics.exportInterval | quote }}
            {{- end }}
            {{- if .Values.observability.otlp.traces.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otlp.traces.endpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "{{ .Values.observability.otlp.traces.insecure }}"
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "{{ .Values.observability.otlp.traces.samplerRatio }}"
            {{- end }}
            {{- if .Values.admin.argocd.enabled }}
            - name: KAAS_ARGOCD_ENABLED
              # Explicit enable flag — the broker checks this first
              # and ignores every other ArgoCD field when not "true".
              # Belt-and-braces with the chart-side gate above: if
              # something out-of-band sets the other env vars without
              # going through the chart, this gate keeps the broker
              # honest.
              value: "true"
            - name: KAAS_ARGOCD_APPLICATION_NAME
              # applicationName falls back to the Helm release name —
              # typical install just sets `admin.argocd.enabled: true`
              # and the broker infers everything else.
              value: {{ default .Release.Name .Values.admin.argocd.applicationName | quote }}
            - name: KAAS_ARGOCD_COMPARE_OPTIONS
              # Empty string (operator wants tracking-id without
              # compare-options) is preserved by quoting; the broker
              # checks LookupEnv to distinguish "set to empty" from
              # "not set".
              value: {{ .Values.admin.argocd.compareOptions | quote }}
            - name: KAAS_ARGOCD_SYNC_OPTIONS
              # Chart default is "Delete=false" — runtime-created
              # topics survive parent Application delete. Set to ""
              # to skip the sync-options annotation entirely.
              value: {{ .Values.admin.argocd.syncOptions | quote }}
            {{- end }}
            {{- /*
            gh #126: every listener flows through KAAS_LISTENERS
            (JSON) — the broker reads that as the single source of
            truth and stops needing per-listener env vars for ports.
            The TLS cert / external-hostname env vars below still
            target the FIRST type=external listener entry (the
            multi-external follow-up will rewire these).
            */}}
            - name: KAAS_LISTENERS
              value: {{ include "kaas.listenersJSON" . | quote }}
            {{- /* gh #126: cluster-wide authorization opt-in. Omitted env = AllowAllAuthorizer. */}}
            {{- if .Values.authorization }}
            {{- with .Values.authorization.type }}
            - name: KAAS_AUTHORIZATION_TYPE
              value: {{ . | quote }}
            {{- end }}
            {{- $su := include "kaas.superUsersList" . }}
            {{- if $su }}
            - name: KAAS_SUPER_USERS
              value: {{ $su | quote }}
            {{- end }}
            {{- end }}
            {{- $external := include "kaas.firstByType" (dict "ctx" . "type" "external") | fromYaml }}
            {{- if include "kaas.hasAnyTLSListener" . }}
            # gh #131: shared TLS material across every tls:true listener
            # (internal or external). The broker reuses a single TLS config
            # for all of them (crates/sk-protocol/src/server.rs) —
            # per-listener cert files are a future extension.
            - name: KAAS_TLS_CERT_FILE
              value: /tls/tls.crt
            - name: KAAS_TLS_KEY_FILE
              value: /tls/tls.key
            {{- end }}
            {{- if $external }}
            # External-listener machinery (per-broker advertised host via
            # fmt-style hostname pattern + pod ordinal). Internal-only TLS
            # deploys never set these.
            - name: KAAS_TLS_PORT
              value: "{{ $external.port }}"
            - name: POD_ORDINAL
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
            - name: EXTERNAL_HOSTNAME_PATTERN
              value: {{ $external.hostnamePattern | quote }}
            {{- if and $external.clientCA $external.clientCA.enabled $external.clientCA.existingSecret }}
            # Mutual TLS: require every TLS client to present a cert
            # signed by this CA bundle.
            - name: KAAS_TLS_CLIENT_CA_FILE
              value: /tls-client-ca/{{ $external.clientCA.key }}
            {{- end }}
            {{- end }}
          # startupProbe gates liveness/readiness during boot. Brokers
          # opening many large partitions on slow shared storage (NFS-
          # backed PVCs in particular) can take minutes to scan logs +
          # reconcile manifests. Without this, kubelet kills the broker
          # mid-recovery and the pod CrashLoops.
          # failureThreshold * periodSeconds = 600s = 10 min budget.
          {{- $probePort := printf "kafka-%s" (include "kaas.primaryListenerName" .) }}
          startupProbe:
            tcpSocket:
              port: {{ $probePort }}
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 60
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: {{ $probePort }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            periodSeconds: 5
            initialDelaySeconds: 5
            # The health server shares the main runtime with NFS
            # group-commit I/O; the default 1 s / 3-strike probe
            # marked busy-but-healthy brokers unready under produce
            # load, and unready EndpointSlice entries feed the
            # controller's alive set. Tolerate ~30 s of sluggishness
            # before pulling a broker out of rotation.
            timeoutSeconds: 4
            failureThreshold: 6
          {{- $external := include "kaas.firstByType" (dict "ctx" . "type" "external") | fromYaml }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.storage.mountPath }}
            {{- if .Values.storage.controlPlane.enabled }}
            - name: cluster-state
              mountPath: {{ .Values.storage.controlPlane.mountPath }}
            {{- end }}
            {{- if include "kaas.hasAnyTLSListener" . }}
            - name: tls
              mountPath: /tls
              readOnly: true
            {{- end }}
            {{- if and $external $external.clientCA $external.clientCA.enabled $external.clientCA.existingSecret }}
            - name: tls-client-ca
              mountPath: /tls-client-ca
              readOnly: true
            {{- end }}
          resources: {{- toYaml .Values.broker.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "kaas.pvcName" . }}
        {{- if .Values.storage.controlPlane.enabled }}
        - name: cluster-state
          persistentVolumeClaim:
            claimName: {{ include "kaas.controlPlanePvcName" . }}
        {{- end }}
        {{- if include "kaas.hasAnyTLSListener" . }}
        - name: tls
          secret:
            # Secret created by cert-manager. The external-listener path
            # (operator-managed) populates `<fullname>-broker-tls`; the
            # internal-listener path (chart-managed, gh #131) populates
            # `<fullname>-broker-internal-tls`. External wins when both
            # exist — its cert is the public-trust one and presumably has
            # the broader SAN list.
            secretName: {{ if $external }}{{ include "kaas.fullname" . }}-broker-tls{{ else }}{{ include "kaas.internalTLSSecretName" . }}{{ end }}
        {{- end }}
        {{- if and $external $external.clientCA $external.clientCA.enabled $external.clientCA.existingSecret }}
        - name: tls-client-ca
          secret:
            secretName: {{ $external.clientCA.existingSecret }}
        {{- end }}
