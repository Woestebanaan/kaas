---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kafkatopics.kaas.rs
spec:
  group: kaas.rs
  names:
    kind: KafkaTopic
    plural: kafkatopics
    singular: kafkatopic
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.partitions
      name: Partitions
      type: integer
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for KafkaTopicSpec via `CustomResource`
        properties:
          spec:
            properties:
              config:
                default: {}
                description: Per-topic configuration knobs. All optional — unset = broker default. Field shapes mirror the operator-side JSON exactly so the broker's `kaas_storage::TopicConfigFile` deserialises the same `.config.json` the operator writes.
                properties:
                  cleanupPolicy:
                    description: '`delete`, `compact`, or `compact,delete`. Empty → broker default (`delete`). Validation is operator-side via the regex.'
                    pattern: ^(delete|compact|compact,delete)?$
                    type: string
                  deleteRetentionMs:
                    format: int64
                    minimum: 0.0
                    nullable: true
                    type: integer
                  minCompactionLagMs:
                    format: int64
                    minimum: 0.0
                    nullable: true
                    type: integer
                  retentionBytes:
                    description: Caps per-partition log size. When the cleaner runs and a partition's total segment bytes exceed this, oldest closed segments are deleted until the partition is back under the limit. Active segment is never touched. `-1` = unlimited (Kafka convention); `0` = treat as unlimited too.
                    format: int64
                    minimum: -1.0
                    nullable: true
                    type: integer
                  retentionMs:
                    description: '`retention.ms` in Kafka semantics: `-1` = infinite (never delete by time). Streams sets this on changelog topics.'
                    format: int64
                    minimum: -1.0
                    nullable: true
                    type: integer
                  segmentBytes:
                    format: int64
                    minimum: 1.0
                    nullable: true
                    type: integer
                type: object
              partitions:
                description: Partition count. Cannot be decreased once set (the reconciler rejects with `InvalidPartitionCount`).
                format: int32
                minimum: 1.0
                type: integer
              storage:
                description: 'gh #221 phase 2: which log dirs (pool volumes) this topic''s partitions may be placed on.'
                nullable: true
                properties:
                  volumeSelector:
                    additionalProperties:
                      type: string
                    description: 'gh #224: label selector over pool members (nodeSelector vocabulary — every key/value must match a member''s `storage.pool[].labels`). Resolved to an eligible set at reconcile time, so topic CRs stay decoupled from infrastructure names. Mutually exclusive with `volumes`; matching zero members fails the reconcile loudly.'
                    nullable: true
                    type: object
                  volumes:
                    description: Pool log-dir names (chart `storage.pool[].name`; `default` is the data volume). Unknown names fail the reconcile loudly. Mutually exclusive with `volumeSelector`.
                    items:
                      type: string
                    type: array
                type: object
              topicName:
                description: |-
                  On-wire Kafka topic name. Empty → defaults to `metadata.name`. Use [`KafkaTopic::effective_topic_name`] in callers; never read this field directly.

                  gh #86 admin-protocol path: when a literal Kafka topic name (uppercase, double underscores, > 253 chars) isn't a valid RFC 1123 K8s resource name, the broker synthesises a hash-derived `metadata.name` and stores the literal name here. Mirrors Strimzi's `spec.topicName`.
                maxLength: 249
                type: string
            required:
            - partitions
            type: object
          status:
            nullable: true
            properties:
              conditions:
                items:
                  description: One status condition. Field shapes mirror apimachinery's `metav1.Condition` exactly.
                  properties:
                    lastTransitionTime:
                      type: string
                      description: RFC 3339 timestamp. Required in the CRD schema but tolerant on deserialise so an operator writing partial conditions (or a pre-existing CR from a prior operator version) doesn't break the broker's watcher.
                    message:
                      type: string
                      description: Human-readable. Required, up to 32768 chars.
                      maxLength: 32768
                    observedGeneration:
                      description: '`metadata.generation` observed at transition. Optional; must be ≥ 0 when set.'
                      format: int64
                      minimum: 0.0
                      nullable: true
                      type: integer
                    reason:
                      type: string
                      description: Programmatic identifier. Required, CamelCase, 1..=1024 chars.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                    status:
                      type: string
                      description: '`True`, `False`, or `Unknown`. Required in the CRD schema; tolerant on deserialise.'
                      pattern: ^(True|False|Unknown)$
                    type:
                      type: string
                      description: CamelCase or `foo.example.com/CamelCase`. Required in the CRD schema; tolerant on deserialise.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                  type: object
                type: array
              partitionCount:
                format: int32
                type: integer
              partitionsOutsideSpec:
                description: 'Number of partitions currently placed on log dirs outside `spec.storage.volumes` — drift from a spec edit, surfaced instead of auto-migrated (data moves are explicit, gh #221).'
                format: int32
                type: integer
              topicId:
                description: 'Stable v4 UUID minted by the operator on first reconcile (gh #105, KIP-516). Never rotated; deleting + re-creating a topic mints a fresh UUID per Apache''s contract. The broker surfaces this on Metadata v10+ responses.'
                type: string
              volumeAssignments:
                additionalProperties:
                  type: string
                description: 'gh #221 phase 2: partition → log-dir name, stamped by the reconciler when a partition is first placed and never recomputed for existing partitions (creation-sticky). String keys because JSON object keys are strings.'
                type: object
            type: object
        required:
        - spec
        title: KafkaTopic
        type: object
    served: true
    storage: true
    subresources:
      status: {}
