apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "skafka.fullname" . }}
  labels: {{- include "skafka.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.broker.replicaCount }}
  serviceName: {{ include "skafka.headlessName" . }}
  # All brokers are identical — no startup ordering needed.
  podManagementPolicy: Parallel
  selector:
    matchLabels: {{- include "skafka.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "skafka.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "skafka.brokerSAName" . }}
      {{- with .Values.broker.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.broker.readinessGate.enabled }}
      # Pod only joins the headless service after all partition leases are held.
      readinessGates:
        - conditionType: "skafka.io/PartitionsReady"
      {{- end }}
      initContainers:
        - name: partition-init
          image: {{ include "skafka.brokerImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--init"]
          env:
            - name: SKAFKA_DATA_DIR
              value: {{ .Values.storage.mountPath }}
            - name: SKAFKA_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: data
              mountPath: {{ .Values.storage.mountPath }}
      containers:
        - name: broker
          image: {{ include "skafka.brokerImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: kafka
              containerPort: {{ .Values.broker.ports.kafka }}
            - name: kafka-tls
              containerPort: {{ .Values.listeners.external.port | default .Values.broker.ports.tls }}
            - name: health
              containerPort: {{ .Values.broker.ports.health }}
            - name: heartbeat
              containerPort: {{ .Values.broker.ports.heartbeat }}
          env:
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SKAFKA_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SKAFKA_HEADLESS_SVC
              value: {{ include "skafka.headlessName" . }}
            - name: SKAFKA_DATA_DIR
              value: {{ .Values.storage.mountPath }}
            - name: SKAFKA_CLUSTER_ID
              value: {{ .Values.broker.clusterID }}
            - name: SKAFKA_CLUSTER_NAME
              # Matches the KafkaCluster CR's metadata.name so the
              # KafkaClusterAssignments CR mirror writes back to the
              # right object (Phase 6).
              value: {{ include "skafka.fullname" . }}
            - name: SKAFKA_PORT
              value: "{{ .Values.broker.ports.kafka }}"
            - name: SKAFKA_HEALTH_ADDR
              value: ":{{ .Values.broker.ports.health }}"
            - name: SKAFKA_CONTROLLER_HEARTBEAT_ADDR
              value: "0.0.0.0:{{ .Values.broker.ports.heartbeat }}"
            - name: SKAFKA_PEER_HEARTBEAT_PORT
              value: "{{ .Values.broker.ports.heartbeat }}"
            - name: SKAFKA_CONTROLLER_LEASE_DURATION_SECONDS
              value: "{{ .Values.broker.controllerLease.durationSeconds }}"
            - name: SKAFKA_CONTROLLER_RENEW_DEADLINE_SECONDS
              value: "{{ .Values.broker.controllerLease.renewDeadlineSeconds }}"
            - name: SKAFKA_CONTROLLER_RETRY_PERIOD_SECONDS
              value: "{{ .Values.broker.controllerLease.retryPeriodSeconds }}"
            - name: SKAFKA_FLUSH_INTERVAL_MESSAGES
              value: "{{ .Values.broker.flushIntervalMessages | default 1 }}"
            {{- if .Values.auth.requireSasl }}
            - name: SKAFKA_REQUIRE_SASL
              value: "true"
            {{- end }}
            {{- if not .Values.auth.enabled }}
            - name: SKAFKA_AUTH_DISABLED
              value: "true"
            {{- end }}
            - name: SKAFKA_LOG_LEVEL
              value: {{ .Values.observability.logs.level | quote }}
            - name: SKAFKA_LOG_FORMAT
              value: {{ .Values.observability.logs.format | quote }}
            {{- if .Values.observability.otlp.metrics.enabled }}
            - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
              value: {{ .Values.observability.otlp.metrics.endpoint | quote }}
            {{- end }}
            {{- if .Values.observability.otlp.traces.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otlp.traces.endpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "{{ .Values.observability.otlp.traces.insecure }}"
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "{{ .Values.observability.otlp.traces.samplerRatio }}"
            {{- end }}
            {{- if .Values.listeners.external.enabled }}
            # TLS listener for external clients. Hostname pattern is fmt-style
            # with the pod ordinal as the single %d argument. The broker reads
            # apps.kubernetes.io/pod-index from the downward-API label.
            - name: SKAFKA_TLS_CERT_FILE
              value: /tls/tls.crt
            - name: SKAFKA_TLS_KEY_FILE
              value: /tls/tls.key
            - name: SKAFKA_TLS_PORT
              value: "{{ .Values.listeners.external.port }}"
            - name: POD_ORDINAL
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
            - name: EXTERNAL_HOSTNAME_PATTERN
              value: {{ .Values.listeners.external.hostnamePattern | quote }}
            {{- if and .Values.listeners.external.tls.clientCA.enabled .Values.listeners.external.tls.clientCA.existingSecret }}
            # Mutual TLS: require every TLS client to present a cert
            # signed by this CA bundle.
            - name: SKAFKA_TLS_CLIENT_CA_FILE
              value: /tls-client-ca/{{ .Values.listeners.external.tls.clientCA.key }}
            {{- end }}
            {{- end }}
          # startupProbe gates liveness/readiness during boot. Brokers
          # opening many large partitions on slow shared storage (NFS-
          # backed PVCs in particular) can take minutes to scan logs +
          # reconcile manifests. Without this, kubelet kills the broker
          # mid-recovery and the pod CrashLoops.
          # failureThreshold * periodSeconds = 600s = 10 min budget.
          startupProbe:
            tcpSocket:
              port: kafka
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 60
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: kafka
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            periodSeconds: 5
            initialDelaySeconds: 5
          volumeMounts:
            - name: data
              mountPath: {{ .Values.storage.mountPath }}
            {{- if .Values.listeners.external.enabled }}
            - name: tls
              mountPath: /tls
              readOnly: true
            {{- if and .Values.listeners.external.tls.clientCA.enabled .Values.listeners.external.tls.clientCA.existingSecret }}
            - name: tls-client-ca
              mountPath: /tls-client-ca
              readOnly: true
            {{- end }}
            {{- end }}
          resources: {{- toYaml .Values.broker.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "skafka.pvcName" . }}
        {{- if .Values.listeners.external.enabled }}
        - name: tls
          secret:
            # Secret created by cert-manager from the Certificate resource.
            # Single Secret shared across all broker pods.
            secretName: {{ include "skafka.fullname" . }}-broker-tls
        {{- if and .Values.listeners.external.tls.clientCA.enabled .Values.listeners.external.tls.clientCA.existingSecret }}
        - name: tls-client-ca
          secret:
            secretName: {{ .Values.listeners.external.tls.clientCA.existingSecret }}
        {{- end }}
        {{- end }}
