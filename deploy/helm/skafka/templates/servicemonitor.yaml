{{- if and .Values.observability.metrics.enabled .Values.observability.metrics.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "skafka.fullname" . }}
  labels:
    {{- include "skafka.labels" . | nindent 4 }}
    {{- with .Values.observability.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels: {{- include "skafka.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.observability.metrics.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.observability.metrics.serviceMonitor.scrapeTimeout }}
{{- end }}
