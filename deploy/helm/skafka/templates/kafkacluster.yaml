{{- /*
KafkaCluster CR. The operator's KafkaClusterReconciler watches this and
materializes the per-broker external-listener resources from it
(cert-manager Certificate, per-broker Service, Gateway API TLSRoute) plus
the KafkaClusterAssignments mirror CR. Day-2 hostname / cert / replica
edits happen by editing this CR directly — no helm upgrade required.

The chart still owns static infra (StatefulSet, PVC, headless Service,
RBAC, NOTES) since none of those depend on runtime decisions; the
KafkaCluster CR is purely the external-listener / cluster-shape surface.
*/ -}}
{{- /*
gh #126: the KafkaCluster CR schema still has internal/external as a
fixed map (operator-side refactor to a list is a separate
follow-up). The chart synthesizes that legacy shape from the first
type=internal + first type=external entry in .Values.listeners.
*/ -}}
{{- $internal := include "skafka.firstByType" (dict "ctx" . "type" "internal") | fromYaml -}}
{{- $external := include "skafka.firstByType" (dict "ctx" . "type" "external") | fromYaml -}}
apiVersion: kaas.rs/v1alpha1
kind: KafkaCluster
metadata:
  name: {{ include "skafka.fullname" . }}
  labels: {{- include "skafka.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.broker.replicaCount }}
  storage:
    className: {{ .Values.storage.className | quote }}
    size: {{ .Values.storage.size | quote }}
  listeners:
    internal:
      port: {{ $internal.port | default 9092 }}
    {{- if $external }}
    external:
      enabled: {{ default false $external.enabled }}
      port: {{ $external.port }}
      hostnamePattern: {{ $external.hostnamePattern | quote }}
      {{- with $external.bootstrapHostname }}
      bootstrapHostname: {{ . | quote }}
      {{- end }}
      tls:
        certManager:
          enabled: {{ $external.certManager.enabled }}
          {{- if $external.certManager.enabled }}
          issuerRef:
            name: {{ $external.certManager.issuerRef.name | quote }}
            kind: {{ $external.certManager.issuerRef.kind | quote }}
          {{- end }}
      gateway:
        enabled: {{ $external.gateway.enabled }}
        {{- if $external.gateway.enabled }}
        gatewayRef:
          name: {{ $external.gateway.gatewayRef.name | quote }}
          {{- with $external.gateway.gatewayRef.namespace }}
          namespace: {{ . | quote }}
          {{- end }}
        {{- end }}
      {{- with $external.service.annotations }}
      service:
        annotations: {{- toYaml . | nindent 10 }}
      {{- end }}
    {{- else }}
    external:
      enabled: false
    {{- end }}
