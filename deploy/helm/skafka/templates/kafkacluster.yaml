{{- /*
KafkaCluster CR. The operator's KafkaClusterReconciler watches this and
materializes the per-broker external-listener resources from it
(cert-manager Certificate, per-broker Service, Gateway API TLSRoute) plus
the KafkaClusterAssignments mirror CR. Day-2 hostname / cert / replica
edits happen by editing this CR directly — no helm upgrade required.

The chart still owns static infra (StatefulSet, PVC, headless Service,
RBAC, NOTES) since none of those depend on runtime decisions; the
KafkaCluster CR is purely the external-listener / cluster-shape surface.
*/ -}}
apiVersion: skafka.io/v1alpha1
kind: KafkaCluster
metadata:
  name: {{ include "skafka.fullname" . }}
  labels: {{- include "skafka.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.broker.replicaCount }}
  storage:
    className: {{ .Values.storage.className | quote }}
    size: {{ .Values.storage.size | quote }}
  listeners:
    internal:
      port: {{ .Values.listeners.internal.port }}
    external:
      enabled: {{ .Values.listeners.external.enabled }}
      port: {{ .Values.listeners.external.port }}
      hostnamePattern: {{ .Values.listeners.external.hostnamePattern | quote }}
      {{- with .Values.listeners.external.bootstrapHostname }}
      bootstrapHostname: {{ . | quote }}
      {{- end }}
      tls:
        certManager:
          enabled: {{ .Values.listeners.external.tls.certManager.enabled }}
          {{- if .Values.listeners.external.tls.certManager.enabled }}
          issuerRef:
            name: {{ .Values.listeners.external.tls.certManager.issuerRef.name | quote }}
            kind: {{ .Values.listeners.external.tls.certManager.issuerRef.kind | quote }}
          {{- end }}
      gateway:
        enabled: {{ .Values.listeners.external.gateway.enabled }}
        {{- if .Values.listeners.external.gateway.enabled }}
        gatewayRef:
          name: {{ .Values.listeners.external.gateway.gatewayRef.name | quote }}
          {{- with .Values.listeners.external.gateway.gatewayRef.namespace }}
          namespace: {{ . | quote }}
          {{- end }}
        {{- end }}
      {{- with .Values.listeners.external.service.annotations }}
      service:
        annotations: {{- toYaml . | nindent 10 }}
      {{- end }}
