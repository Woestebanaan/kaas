{{- if and .Values.listeners.external.enabled .Values.listeners.external.gateway.enabled }}
{{- range $i, $e := until (int .Values.broker.replicaCount) }}
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: {{ include "skafka.fullname" $ }}-broker-{{ $i }}
  labels:
    {{- include "skafka.labels" $ | nindent 4 }}
    skafka.io/broker-ordinal: "{{ $i }}"
spec:
  # SNI hostname match: traffic with this SNI is routed to the matching pod.
  # The Gateway never terminates TLS — it forwards raw bytes to the broker
  # pod, where the TLS session ends.
  hostnames:
    - {{ printf $.Values.listeners.external.hostnamePattern $i | quote }}
  parentRefs:
    - name: {{ $.Values.listeners.external.gateway.gatewayRef.name }}
      {{- with $.Values.listeners.external.gateway.gatewayRef.namespace }}
      namespace: {{ . }}
      {{- end }}
  rules:
    - backendRefs:
        - name: {{ include "skafka.fullname" $ }}-broker-{{ $i }}
          port: {{ $.Values.listeners.external.port }}
{{- end }}
{{- end }}
