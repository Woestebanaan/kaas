{{- /*
gh #97: per-broker ClusterIP Services. Each broker pod gets its own
Service with a stable VIP so clients reaching `<fullname>-broker-N`
always hit broker N — across pod restarts, IP changes, even node
reschedules. Mirrors Strimzi's pattern (`<kafka-cluster>-broker-<id>`
ClusterIP per broker), which is what the brokers advertise in
MetadataResponse so cached metadata survives restarts.

The headless Service in broker-service.yaml stays — StatefulSet
requires it as `serviceName`, and the EndpointSlice it backs is the
peer-discovery surface (BrokerRegistry watches this slice). The new
per-broker Services are PURELY for stable client routing; they
don't replace the headless one.

Selector: statefulset.kubernetes.io/pod-name pins each Service to
exactly one pod (label is set automatically by K8s ≥ 1.16). Pod
name pattern is `<fullname>-<ordinal>` (StatefulSet default). Each
Service's VIP is stable; kube-proxy resolves it to the current pod
IP via the selector.
*/}}
{{- range $i, $_ := until (int .Values.broker.replicaCount) }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "skafka.fullname" $ }}-broker-{{ $i }}
  labels:
    {{- include "skafka.labels" $ | nindent 4 }}
    skafka.io/broker-ordinal: "{{ $i }}"
spec:
  type: ClusterIP
  selector:
    statefulset.kubernetes.io/pod-name: {{ include "skafka.fullname" $ }}-{{ $i }}
  ports:
    - name: kafka
      port: {{ $.Values.broker.ports.kafka }}
      targetPort: kafka
    {{- if $.Values.listeners.external.enabled }}
    - name: kafka-tls
      port: {{ $.Values.listeners.external.port | default $.Values.broker.ports.tls }}
      targetPort: kafka-tls
    {{- end }}
{{- end }}
