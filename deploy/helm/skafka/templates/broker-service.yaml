{{- /*
gh #126: iterate the listeners array to emit one Service port per
enabled entry. Listeners without `enabled` (the "plain" default)
are always emitted; those with `enabled: false` are skipped.
*/ -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "skafka.headlessName" . }}
  labels: {{- include "skafka.labels" . | nindent 4 }}
spec:
  # Headless service: provides per-pod DNS names for the StatefulSet.
  clusterIP: None
  publishNotReadyAddresses: false
  selector: {{- include "skafka.selectorLabels" . | nindent 4 }}
  ports:
  {{- range .Values.listeners }}
    {{- if or (not (hasKey . "enabled")) .enabled }}
    - name: kafka-{{ .name }}
      port: {{ .port }}
      targetPort: kafka-{{ .name }}
    {{- end }}
  {{- end }}
    - name: heartbeat
      # Internal-only: brokers dial each other's heartbeat port to reach
      # the elected cluster controller. Headless DNS gives each pod a
      # stable name so the resolver in cmd/skafka/cluster_runtime.go can
      # follow Lease handoffs.
      port: {{ .Values.broker.ports.heartbeat }}
      targetPort: heartbeat
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "skafka.fullname" . }}
  labels: {{- include "skafka.labels" . | nindent 4 }}
spec:
  # Client-facing Service. Load-balances to any ready broker; clients retry on
  # NOT_LEADER_FOR_PARTITION.
  type: ClusterIP
  selector: {{- include "skafka.selectorLabels" . | nindent 4 }}
  ports:
  {{- range .Values.listeners }}
    {{- if or (not (hasKey . "enabled")) .enabled }}
    - name: kafka-{{ .name }}
      port: {{ .port }}
      targetPort: kafka-{{ .name }}
    {{- end }}
  {{- end }}
