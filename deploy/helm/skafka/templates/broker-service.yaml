apiVersion: v1
kind: Service
metadata:
  name: {{ include "skafka.headlessName" . }}
  labels: {{- include "skafka.labels" . | nindent 4 }}
spec:
  # Headless service: provides per-pod DNS names for the StatefulSet.
  clusterIP: None
  publishNotReadyAddresses: false
  selector: {{- include "skafka.selectorLabels" . | nindent 4 }}
  ports:
    - name: kafka
      port: {{ .Values.broker.ports.kafka }}
      targetPort: kafka
    {{- if .Values.listeners.authed.enabled }}
    - name: kafka-authed
      # gh #139: SASL-required plaintext listener. Same headless DNS as
      # the anonymous listener, just a different port — the per-listener
      # SASL gate runs broker-side from the listener tag, not from any
      # DNS routing.
      port: {{ .Values.listeners.authed.port }}
      targetPort: kafka-authed
    {{- end }}
    - name: heartbeat
      # Internal-only: brokers dial each other's heartbeat port to reach
      # the elected cluster controller. Headless DNS gives each pod a
      # stable name so the resolver in cmd/skafka/cluster_runtime.go can
      # follow Lease handoffs.
      port: {{ .Values.broker.ports.heartbeat }}
      targetPort: heartbeat
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "skafka.fullname" . }}
  labels: {{- include "skafka.labels" . | nindent 4 }}
spec:
  # Client-facing Service. Load-balances to any ready broker; clients retry on
  # NOT_LEADER_FOR_PARTITION. Superseded by the router in Phase 9.
  type: ClusterIP
  selector: {{- include "skafka.selectorLabels" . | nindent 4 }}
  ports:
    - name: kafka
      port: {{ .Values.broker.ports.kafka }}
      targetPort: kafka
    {{- if .Values.auth.tls.enabled }}
    - name: tls
      port: {{ .Values.broker.ports.tls }}
      targetPort: tls
    {{- end }}
    {{- if .Values.listeners.authed.enabled }}
    - name: kafka-authed
      port: {{ .Values.listeners.authed.port }}
      targetPort: kafka-authed
    {{- end }}
