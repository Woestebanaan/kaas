{{- if .Values.serviceAccount.broker.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "skafka.brokerSAName" . }}
  labels: {{- include "skafka.labels" . | nindent 4 }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "skafka.fullname" . }}-broker
  labels: {{- include "skafka.labels" . | nindent 4 }}
rules:
  # Controller election + epoch watch via Leases. The broker
  # acquires/renews the skafka-controller Lease with server-side
  # apply, which needs `patch`.
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch]
  # Cluster topology.
  - apiGroups: [discovery.k8s.io]
    resources: [endpointslices]
    verbs: [get, list, watch]
  # KafkaUser: brokers watch + patch quotas. The watch covers the
  # operator's spec.authorization → acls.json translation (brokers
  # only consume that file); update/patch cover the admin-protocol
  # paths: AlterClientQuotas (gh #103 phase 2) writes spec.quotas,
  # and CreateAcls/DeleteAcls (gh #107) mutate
  # spec.authorization.acls so kafka-acls.sh / AdminClient ACL
  # writes land on the CR. gh #135: kafkaacls + kafkausergroups
  # removed.
  - apiGroups: [skafka.io]
    resources: [kafkausers]
    verbs: [get, list, watch, update, patch]
  # KafkaTopic: brokers watch + manage. The watch covers the
  # operator-driven path (kubectl apply -f); create/delete cover
  # the admin-protocol path (gh #51) where Kafbat / kafka-topics.sh
  # / Java AdminClient calls CreateTopics/DeleteTopics on the broker
  # and the broker's TopicCRWriter writes the CR. update/patch cover
  # CreatePartitions (gh #52, key 37 — TopicCRWriter.ExpandTopic) and
  # IncrementalAlterConfigs (gh #9, key 44 — UpdateTopicConfig), both
  # of which mutate spec on an existing KafkaTopic CR.
  - apiGroups: [skafka.io]
    resources: [kafkatopics]
    verbs: [get, list, watch, create, update, patch, delete]
  # KafkaClusterAssignments mirror: the elected controller broker
  # writes Status to it via crates/sk-controller/src/k8s_mirror.rs after every
  # assignment.json change. Read on every broker (debug/diag); update
  # only fires on the controller, but RBAC is per-pod identity.
  - apiGroups: [skafka.io]
    resources: [kafkaclusterassignments]
    verbs: [get, list, watch]
  - apiGroups: [skafka.io]
    resources: [kafkaclusterassignments/status]
    verbs: [get, update, patch]
  # Kubernetes ServiceAccount JWT validation (SASL PLAIN).
  - apiGroups: [authentication.k8s.io]
    resources: [tokenreviews]
    verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "skafka.fullname" . }}-broker
  labels: {{- include "skafka.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "skafka.fullname" . }}-broker
subjects:
  - kind: ServiceAccount
    name: {{ include "skafka.brokerSAName" . }}
    namespace: {{ .Release.Namespace }}
---
# Own-namespace Role: Secrets + pods/status.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "skafka.fullname" . }}-broker
  labels: {{- include "skafka.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch]
  # ReadinessGate updates — own pod only (k8s scopes automatically).
  - apiGroups: [""]
    resources: [pods/status]
    verbs: [get, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "skafka.fullname" . }}-broker
  labels: {{- include "skafka.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "skafka.fullname" . }}-broker
subjects:
  - kind: ServiceAccount
    name: {{ include "skafka.brokerSAName" . }}
    namespace: {{ .Release.Namespace }}
