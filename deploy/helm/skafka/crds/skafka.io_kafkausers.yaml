---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kafkausers.skafka.io
spec:
  group: skafka.io
  names:
    categories: []
    kind: KafkaUser
    plural: kafkausers
    shortNames: []
    singular: kafkauser
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.authentication.type
      name: Auth type
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for KafkaUserSpec via `CustomResource`
        properties:
          spec:
            properties:
              authentication:
                properties:
                  certificateRef:
                    description: Used when `type = tls`. The operator stamps the CN into `credentials.json` as the mTLS principal.
                    nullable: true
                    properties:
                      name:
                        type: string
                    required:
                    - name
                    type: object
                  password:
                    description: 'Input Secret carrying the SCRAM password (gh #136 — optional; when unset the operator auto-generates a stable 32-char password into the output Secret `<user>-kafka-credentials`).'
                    nullable: true
                    properties:
                      key:
                        type: string
                      name:
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  scram:
                    description: 'Pre-derived SCRAM credential (gh #104, KIP-554). When set, the operator passes the salt/storedKey/serverKey/iterations through to `credentials.json` verbatim and skips PBKDF2 — the wire-level admin path uses this to rotate runtime credentials without an intermediate Secret.'
                    nullable: true
                    properties:
                      iterations:
                        format: int32
                        type: integer
                      salt:
                        type: string
                      serverKey:
                        type: string
                      storedKey:
                        type: string
                    required:
                    - iterations
                    - salt
                    - serverKey
                    - storedKey
                    type: object
                  serviceAccountRef:
                    description: Used when `type = kubernetes-serviceaccount`. Wired in Phase 7 alongside the JWT validation path.
                    nullable: true
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                    required:
                    - name
                    - namespace
                    type: object
                  type:
                    description: '`scram-sha-512`, `tls`, or `kubernetes-serviceaccount`.'
                    pattern: ^(scram-sha-512|tls|kubernetes-serviceaccount)$
                    type: string
                required:
                - type
                type: object
              authorization:
                nullable: true
                properties:
                  acls:
                    items:
                      properties:
                        host:
                          description: Source-IP filter. Empty = any host (Apache `*` wildcard). Stored for round-trip but ignored at the broker (only "any" is enforced today).
                          type: string
                        operations:
                          items:
                            type: string
                          minItems: 1
                          type: array
                        resource:
                          properties:
                            name:
                              type: string
                            patternType:
                              description: '`literal` or `prefix`. Empty → operator-side default `literal` (gh #137).'
                              pattern: ^(literal|prefix)?$
                              type: string
                            type:
                              description: '`topic`, `group`, `cluster`, or `transactionalId`.'
                              pattern: ^(topic|group|cluster|transactionalId)$
                              type: string
                          required:
                          - name
                          - type
                          type: object
                        type:
                          description: '`allow` or `deny`. Empty → operator-side default `allow` (gh #137 — no apiserver defaulting).'
                          pattern: ^(allow|deny)?$
                          type: string
                      required:
                      - operations
                      - resource
                      type: object
                    type: array
                  type:
                    description: '`simple` today. Field is reserved for forward compat (OPA / OIDC). **Not** apiserver-defaulted — gh #137. The operator treats empty as "simple" at reconcile time.'
                    pattern: ^(simple)?$
                    type: string
                required:
                - acls
                type: object
              quotas:
                nullable: true
                properties:
                  consumerMaxByteRatePerBroker:
                    description: Consumer cap at THIS broker only.
                    format: int64
                    minimum: 0.0
                    nullable: true
                    type: integer
                  producerMaxByteRatePerBroker:
                    description: 'Producer cap at THIS broker only (Apache Kafka 3.7 / KIP-13 per-broker semantics). With N brokers the effective cluster-wide ceiling is N × this. Gh #126 — the named- honestly divergence from Strimzi''s `producerByteRate`.'
                    format: int64
                    minimum: 0.0
                    nullable: true
                    type: integer
                  requestPercentage:
                    format: int32
                    maximum: 100.0
                    minimum: 0.0
                    nullable: true
                    type: integer
                type: object
            required:
            - authentication
            type: object
          status:
            nullable: true
            properties:
              conditions:
                items:
                  description: One status condition. Field shapes mirror apimachinery's `metav1.Condition` exactly.
                  properties:
                    last_transition_time:
                      description: RFC 3339 timestamp. Required.
                      type: string
                    message:
                      description: Human-readable. Required, up to 32768 chars.
                      maxLength: 32768
                      type: string
                    observed_generation:
                      description: '`metadata.generation` observed at transition. Optional; must be ≥ 0 when set.'
                      format: int64
                      minimum: 0.0
                      nullable: true
                      type: integer
                    reason:
                      description: Programmatic identifier. Required, CamelCase, 1..=1024 chars.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: '`True`, `False`, or `Unknown`. Required.'
                      pattern: ^(True|False|Unknown)$
                      type: string
                    type:
                      description: CamelCase or `foo.example.com/CamelCase`. Required.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - last_transition_time
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              secret:
                description: 'Output Secret name (gh #136 — populated for SCRAM users whose password the operator auto-generated).'
                type: string
            type: object
        required:
        - spec
        title: KafkaUser
        type: object
    served: true
    storage: true
    subresources:
      status: {}
