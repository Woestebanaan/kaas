---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: kafkaclusterassignments.skafka.io
spec:
  group: skafka.io
  names:
    kind: KafkaClusterAssignments
    listKind: KafkaClusterAssignmentsList
    plural: kafkaclusterassignments
    singular: kafkaclusterassignments
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.controller
      name: Controller
      type: string
    - jsonPath: .status.controllerEpoch
      name: Epoch
      type: integer
    - jsonPath: .status.assignmentVersion
      name: Version
      type: integer
    - jsonPath: .status.truncated
      name: Truncated
      type: boolean
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          KafkaClusterAssignments is a best-effort, read-only debug mirror of the
          authoritative cluster assignment held in /data/__cluster/assignment.json on
          the shared PVC. The controller broker writes this CR fire-and-forget after
          every authoritative file write; brokers never read it. One CR per
          KafkaCluster, sharing the KafkaCluster's name and namespace.

          Spec is intentionally empty — all state lives in Status. Modifying Spec has
          no effect on cluster behaviour.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            type: object
          status:
            properties:
              assignmentVersion:
                description: |-
                  AssignmentVersion is a controller-local monotonic counter, incremented
                  on every write within a single controller's tenure.
                format: int64
                type: integer
              brokers:
                items:
                  properties:
                    health:
                      enum:
                      - alive
                      - draining
                      - dead
                      type: string
                    id:
                      type: string
                    lastSeen:
                      type: string
                  required:
                  - health
                  - id
                  type: object
                type: array
              consumerGroups:
                items:
                  properties:
                    broker:
                      type: string
                    epoch:
                      format: int64
                      type: integer
                    groupId:
                      type: string
                  required:
                  - broker
                  - epoch
                  - groupId
                  type: object
                type: array
              controller:
                description: Controller is the broker ID currently holding the controller
                  Lease.
                type: string
              controllerEpoch:
                description: |-
                  ControllerEpoch is the leaseTransitions value of the skafka-controller
                  Lease at the moment the assignment was written. Brokers reject files
                  with a stale epoch.
                format: int64
                type: integer
              generatedAt:
                description: |-
                  GeneratedAt is the wall-clock time the controller produced this
                  assignment. RFC3339.
                type: string
              partitions:
                items:
                  properties:
                    broker:
                      type: string
                    epoch:
                      format: int64
                      type: integer
                    partition:
                      format: int32
                      type: integer
                    role:
                      enum:
                      - leader
                      type: string
                    topic:
                      type: string
                  required:
                  - broker
                  - epoch
                  - partition
                  - topic
                  type: object
                type: array
              truncated:
                description: |-
                  Truncated is true when the partition list was clipped to fit under the
                  1MB Kubernetes object size limit. Inspect the file on the PVC for the
                  full list when this is set.
                type: boolean
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
