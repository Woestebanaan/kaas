image:
  repository: ghcr.io/woestebanaan/skafka
  tag: ""              # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

operator:
  enabled: true
  image:
    repository: ghcr.io/woestebanaan/skafka-operator
    tag: ""
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

broker:
  replicaCount: 3
  clusterID: skafka-local
  ports:
    kafka: 9092
    tls: 9093
    health: 8080
    # Internal-only gRPC heartbeat between brokers and the elected
    # cluster controller (Phase 4/5). Not exposed externally; the
    # headless service routes this so peers can dial each other.
    heartbeat: 9094
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi
  readinessGate:
    # Adds the skafka.io/PartitionsReady readinessGate to broker pods. Required
    # whenever the broker's ReadinessUpdater is expected to gate Endpoints
    # membership on initial partition acquisition. Disable for bare-bones smoke
    # tests where you just want the pod Ready as soon as the listener is up.
    enabled: true

  # v3 cluster-controller Lease (Phase 4). One Lease per cluster; the
  # winning broker runs the AssignmentLoop + heartbeat gRPC server.
  # Tighter durations = faster failover, more etcd writes; defaults match
  # client-go's recommended renew/retry ratios.
  controllerLease:
    durationSeconds: 15      # SKAFKA_CONTROLLER_LEASE_DURATION_SECONDS
    renewDeadlineSeconds: 10 # SKAFKA_CONTROLLER_RENEW_DEADLINE_SECONDS
    retryPeriodSeconds: 2    # SKAFKA_CONTROLLER_RETRY_PERIOD_SECONDS

storage:
  className: ceph-filesystem    # or nfs-csi
  size: 500Gi
  accessMode: ReadWriteMany
  mountPath: /data

auth:
  # When false, the broker uses an AllowAllAuthEngine (no authentication,
  # ANONYMOUS principal for every connection). When true (default), the
  # RealAuthEngine reads credentials.json and acls.json from the shared
  # PVC. Translates to SKAFKA_AUTH_DISABLED env var on the broker.
  enabled: true
  mechanisms:
    - SCRAM-SHA-512
  # When true, the dispatcher rejects non-ApiVersions/SaslHandshake/SaslAuthenticate
  # requests from connections that haven't completed SASL — closes the
  # "anonymous fallthrough" hole. Translates to SKAFKA_REQUIRE_SASL.
  requireSasl: false
  tls:
    enabled: false
    existingSecret: ""          # Secret with tls.crt + tls.key
    certManagerIssuer: ""

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

serviceAccount:
  broker:
    create: true
    name: ""
  operator:
    create: true
    name: ""

autoscaling:
  enabled: false
  minReplicas: 3
  maxReplicas: 10
  targetConsumerLagMessages: 100000

observability:
  # Prometheus scrape endpoint on every broker / operator pod. Cheap, always on.
  metrics:
    enabled: true
    port: 9464
    # Create a Prometheus Operator ServiceMonitor (requires the CRD installed).
    serviceMonitor:
      enabled: false
      labels: {}
      interval: 30s
      scrapeTimeout: 10s

  # OTLP push for traces (and optionally metrics). Off by default; point at an
  # OpenTelemetry Collector to enable.
  otlp:
    enabled: false
    endpoint: "otel-collector.observability.svc.cluster.local:4317"
    insecure: true
    traces:
      # 0.0 = off; 1.0 = every trace. Production default 0.1.
      samplerRatio: 0.1

  logs:
    level: info        # debug|info|warn|error
    format: json       # json|text

listeners:
  internal:
    # Plaintext in-cluster listener. Always active; clients use headless DNS.
    port: 9092

  external:
    # External listener is opt-in. When disabled, no Certificate / per-broker
    # Service / TLSRoute is created; clients must use the internal headless DNS.
    enabled: false
    port: 9093

    # fmt-style pattern substituted with the broker ordinal.
    # Example: "broker-%d.kafka.example.com" → broker-0.kafka.example.com, etc.
    hostnamePattern: "broker-%d.kafka.example.com"

    # Optional convenience hostname (e.g. a CNAME to broker-0). Added to the
    # certificate SANs so clients can use a single bootstrap address.
    bootstrapHostname: ""

    tls:
      certManager:
        enabled: true
        issuerRef:
          name: letsencrypt-prod
          kind: ClusterIssuer

      # Mutual TLS: when set, the broker requires every TLS client to
      # present a cert signed by one of the CAs in this bundle. Pair
      # with auth.mechanisms = ["mTLS"] (or include alongside SCRAM)
      # for full mTLS authentication. Disabled by default — opportunistic
      # mTLS still works without this (the broker will record the client
      # CN as principal if a cert is presented, otherwise fall back to
      # SASL or anonymous per auth.requireSasl).
      clientCA:
        enabled: false
        # Name of an existing Secret containing the CA bundle. The chart
        # mounts secret.key (default ca.crt) at /tls-client-ca/ca.crt and
        # sets SKAFKA_TLS_CLIENT_CA_FILE to point at it.
        existingSecret: ""
        key: ca.crt

    gateway:
      # Create one TLSRoute per broker when true. Requires Gateway API CRDs
      # and a Gateway resource with a TLS passthrough listener on the external
      # port. If false, per-broker Services are still created and can be fronted
      # by per-broker LoadBalancer Services instead.
      enabled: true
      gatewayRef:
        name: skafka-gateway
        namespace: kafka

    service:
      annotations: {}
