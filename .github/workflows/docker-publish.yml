name: Docker publish

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  BROKER_IMAGE: ghcr.io/${{ github.repository }}
  OPERATOR_IMAGE: ghcr.io/${{ github.repository }}-operator

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (for cross-compilation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (broker)
        id: broker-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BROKER_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push broker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.broker-meta.outputs.tags }}
          labels: ${{ steps.broker-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (operator)
        id: operator-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.OPERATOR_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push operator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.operator
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.operator-meta.outputs.tags }}
          labels: ${{ steps.operator-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
