name: release

on:
  push:
    tags:
      - 'v*'

# Opt actions into Node 24 early — Node 20 is deprecated on GitHub runners.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: arc-runner-set
    environment: release
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Wait for Docker daemon (DinD sidecar)
        run: |
          echo "DOCKER_HOST=${DOCKER_HOST:-<unset>}"
          for i in $(seq 1 30); do
            if docker info >/dev/null 2>&1; then
              echo "docker daemon ready after ${i}s"
              docker version
              exit 0
            fi
            sleep 1
          done
          echo "docker daemon did not become ready"
          docker info || true
          exit 1

      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image names
        id: names
        run: |
          VERSION=${{ github.ref_name }}
          OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')
          echo "owner=${OWNER}" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "broker_image=ghcr.io/${OWNER}/skafka-preview" >> "$GITHUB_OUTPUT"
            echo "operator_image=ghcr.io/${OWNER}/skafka-operator-preview" >> "$GITHUB_OUTPUT"
          else
            echo "broker_image=ghcr.io/${OWNER}/skafka" >> "$GITHUB_OUTPUT"
            echo "operator_image=ghcr.io/${OWNER}/skafka-operator" >> "$GITHUB_OUTPUT"
          fi

      - name: Build + push broker image
        id: broker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.names.outputs.broker_image }}:${{ github.ref_name }}

      - name: Cosign broker image
        run: |
          cosign sign --yes \
            "${{ steps.names.outputs.broker_image }}@${{ steps.broker.outputs.digest }}"

      - name: Build + push operator image
        id: operator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.operator
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.names.outputs.operator_image }}:${{ github.ref_name }}

      - name: Cosign operator image
        run: |
          cosign sign --yes \
            "${{ steps.names.outputs.operator_image }}@${{ steps.operator.outputs.digest }}"

      - uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Package + push Helm chart
        id: chart
        env:
          VERSION: ${{ github.ref_name }}
          OWNER: ${{ steps.names.outputs.owner }}
        run: |
          CHART_VERSION=${VERSION#v}
          helm package deploy/helm/skafka \
            --version "$CHART_VERSION" \
            --app-version "$CHART_VERSION"
          helm registry login ghcr.io \
            -u "${{ github.actor }}" \
            -p "${{ secrets.GITHUB_TOKEN }}"
          PUSH_OUT=$(helm push "skafka-${CHART_VERSION}.tgz" \
            "oci://ghcr.io/${OWNER}/charts" 2>&1)
          echo "$PUSH_OUT"
          DIGEST=$(echo "$PUSH_OUT" | awk '/Digest:/ {print $2}')
          echo "chart_ref=ghcr.io/${OWNER}/charts/skafka@${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Cosign Helm chart
        run: |
          cosign sign --yes "${{ steps.chart.outputs.chart_ref }}"
