name: release

# Triggered by semver tags. Publishes both container images and the Helm chart
# to GHCR. Guardrails:
#   - pre-release tags (v*-*) publish to separate image names
#
# Runs on the Woestebanaan/kaas ARC runner set (apps/arc-runners in the
# k3s-cluster repo). containerMode=dind provides a privileged Docker daemon
# which supports QEMU, multi-arch, and GHA cache.
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: arc-runner-set
    environment: release
    permissions:
      contents: read
      packages: write
    env:
      # docker/build-push-action@v7 uploads buildx "build records" as Actions
      # artifacts by default. They duplicate provenance metadata that already
      # lives on the GHCR image and consume the (account-wide) Actions
      # storage quota. We don't use them, so disable.
      DOCKER_BUILD_SUMMARY: "false"
      DOCKER_BUILD_RECORD_UPLOAD: "false"

    steps:
      - name: Wait for Docker daemon (DinD sidecar)
        run: |
          echo "DOCKER_HOST=${DOCKER_HOST:-<unset>}"
          for i in $(seq 1 30); do
            if docker info >/dev/null 2>&1; then
              echo "docker daemon ready after ${i}s"
              docker version
              exit 0
            fi
            sleep 1
          done
          echo "docker daemon did not become ready"
          docker info || true
          exit 1

      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image names
        id: names
        run: |
          VERSION=${{ github.ref_name }}
          OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG=${VERSION#v}
          echo "owner=${OWNER}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "broker_image=ghcr.io/${OWNER}/kaas-preview" >> "$GITHUB_OUTPUT"
            echo "operator_image=ghcr.io/${OWNER}/kaas-operator-preview" >> "$GITHUB_OUTPUT"
          else
            echo "broker_image=ghcr.io/${OWNER}/kaas" >> "$GITHUB_OUTPUT"
            echo "operator_image=ghcr.io/${OWNER}/kaas-operator" >> "$GITHUB_OUTPUT"
          fi

      - name: Build + push broker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bins/kaas/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.names.outputs.broker_image }}:${{ steps.names.outputs.image_tag }}

      - name: Build + push operator image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bins/kaas-operator/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.names.outputs.operator_image }}:${{ steps.names.outputs.image_tag }}

      - uses: azure/setup-helm@v5
        with:
          version: 'v3.14.0'

      - name: Package + push Helm chart
        env:
          VERSION: ${{ github.ref_name }}
          OWNER: ${{ steps.names.outputs.owner }}
        run: |
          CHART_VERSION=${VERSION#v}
          helm package deploy/helm/kaas \
            --version "$CHART_VERSION" \
            --app-version "$CHART_VERSION"
          helm registry login ghcr.io \
            -u "${{ github.actor }}" \
            -p "${{ secrets.GITHUB_TOKEN }}"
          helm push "kaas-${CHART_VERSION}.tgz" \
            "oci://ghcr.io/${OWNER}/charts"
