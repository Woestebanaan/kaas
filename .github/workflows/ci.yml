name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: arc-runner-set
    steps:
      - name: Runner preflight
        run: |
          echo "--- uname ---"; uname -a
          echo "--- user ---"; id
          echo "--- git ---"; git --version || echo "NO git"
          echo "--- tools on PATH ---"
          for t in curl wget tar make gcc go docker helm; do
            if command -v "$t" >/dev/null; then echo "$t: $(command -v $t)"
            else echo "$t: MISSING"; fi
          done

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      # golangci-lint is currently disabled: the latest published golangci-lint
      # is built with Go 1.24 and refuses to load a project whose go.mod targets
      # Go 1.26.1. Re-enable once a golangci-lint release built with Go 1.26 ships.
      # Tracking: https://github.com/golangci/golangci-lint/releases

      - name: go test
        run: go test ./...

      - name: Install controller-gen
        run: go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.20.1

      - name: Check CRD manifests are up to date
        run: |
          "$(go env GOPATH)/bin/controller-gen" \
            crd paths="./operator/api/..." \
            output:crd:artifacts:config=deploy/crds
          git diff --exit-code -- deploy/crds/

  docker:
    runs-on: arc-runner-set
    steps:
      - name: Wait for Docker daemon (DinD sidecar)
        # The DinD sidecar takes a few seconds to start. The runner container
        # can begin executing before dockerd is listening, which makes the
        # first docker action fail with "Cannot connect to the Docker daemon".
        run: |
          echo "DOCKER_HOST=${DOCKER_HOST:-<unset>}"
          for i in $(seq 1 30); do
            if docker info >/dev/null 2>&1; then
              echo "docker daemon ready after ${i}s"
              docker version
              exit 0
            fi
            sleep 1
          done
          echo "docker daemon did not become ready"
          docker info || true
          exit 1

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          install: true
          driver: docker-container

      - name: Build broker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          # No cache-to on CI: inline/GHA caches require push:true or env vars
          # that may not be present. Plain build keeps the dependency minimal.

      - name: Build operator image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.operator
          push: false

  helm:
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'
      - name: helm lint
        run: helm lint deploy/helm/skafka
      - name: helm template
        run: helm template test-release deploy/helm/skafka > /tmp/rendered.yaml
