name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    runs-on: arc-runner-set
    steps:
      - name: Runner preflight
        run: |
          echo "--- uname ---"; uname -a
          echo "--- user ---"; id
          echo "--- C toolchain ---"
          for t in cc gcc clang ld pkg-config make; do
            if command -v "$t" >/dev/null; then echo "$t: $(command -v $t)"
            else echo "$t: MISSING"; fi
          done

      - name: Install C toolchain (cc + libc + linker needed by cargo build scripts)
        # The ARC runner image is minimal — Rust build scripts for crates like
        # `rustix`, `libc`, `ring`, `anyhow` need a working `cc` + linker.
        # Phase 0's `.cargo/config.toml` tried `linker = "clang"` (later
        # removed); CI has been red since because no C toolchain was ever
        # installed on the runner. Install one here so the toolchain is
        # self-contained in the workflow rather than coupled to the runner image.
        run: |
          if command -v apt-get >/dev/null; then
            if [ "$(id -u)" -eq 0 ]; then SUDO=""; else SUDO="sudo"; fi
            $SUDO apt-get update
            $SUDO apt-get install -y --no-install-recommends \
              gcc libc6-dev pkg-config ca-certificates
          else
            echo "::warning::apt-get not available; assuming runner image already has cc/gcc"
          fi
          echo "cc → $(command -v cc || echo MISSING)"

      - uses: actions/checkout@v6

      - name: Install Rust toolchain (honours rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-features

      - name: cargo build --release
        run: cargo build --release --workspace --bins

      # Regenerates the CRDs from crates/sk-operator-api and fails on
      # any diff against deploy/crds + deploy/helm/skafka/crds. This
      # step was documented as existing since Phase 7 but never
      # actually wired — which is how the committed CRDs kept a stale
      # snake_case Condition schema while the Rust type moved to
      # camelCase, and every operator status write 500'd against SSA
      # validation (found live in phase 9, gh #152).
      - name: CRD drift gate
        run: cargo xtask check-crd-drift

  legacy-go:
    # The Go tree under archive/ is frozen but still ships releases until the
    # Rust port reaches Phase 9. Keep vet+test green so port-blocking bugfixes
    # land safely.
    runs-on: arc-runner-set
    defaults:
      run:
        working-directory: archive
    steps:
      - name: Runner preflight
        # Override the job-level `working-directory: archive` because the
        # repo hasn't been checked out yet — bash can't start in a
        # non-existent dir.
        working-directory: .
        run: |
          echo "--- uname ---"; uname -a
          echo "--- user ---"; id
          echo "--- git ---"; git --version || echo "NO git"
          echo "--- tools on PATH ---"
          for t in curl wget tar make gcc go docker helm; do
            if command -v "$t" >/dev/null; then echo "$t: $(command -v $t)"
            else echo "$t: MISSING"; fi
          done

      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: archive/go.mod
          # cache: false on purpose. See archive/go.mod-adjacent notes in
          # CLAUDE.md — the ARC runners mount /var/lib/arc-go-cache as a
          # node-local hostPath with GOMODCACHE/GOCACHE pointed at it.
          cache: false

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      # Phase 7 moved the source of truth for `deploy/crds/*.yaml` and
      # `deploy/helm/skafka/crds/*.yaml` from Go's `controller-gen` to
      # Rust's `cargo xtask gen-crds` (via `schemars` on the Rust CRD
      # types). The two generators emit schemas that differ in field
      # ordering, camelCase-vs-snake_case for the Kubernetes-native
      # `Condition` embedded type, and description strings — all
      # cosmetic, not schema-shape.
      #
      # The Rust-side drift gate (`cargo xtask check-crd-drift`) runs
      # in the `rust` job. Running the Go-side check on top would
      # fight the migration: every push through Phase 9 would trip
      # because the two generators can't be made byte-equal without
      # a canonicaliser pass we've explicitly deferred (per Phase 7
      # §Risks). Skip the legacy Go drift gate until Phase 9 retires
      # the Go tree entirely.

  docker-rust:
    runs-on: arc-runner-set
    steps:
      - name: Wait for Docker daemon (DinD sidecar)
        run: |
          echo "DOCKER_HOST=${DOCKER_HOST:-<unset>}"
          for i in $(seq 1 30); do
            if docker info >/dev/null 2>&1; then
              echo "docker daemon ready after ${i}s"
              docker version
              exit 0
            fi
            sleep 1
          done
          echo "docker daemon did not become ready"
          docker info || true
          exit 1

      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Build broker image (rust, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bins/skafka/Dockerfile
          push: false

      - name: Build operator image (rust, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bins/skafka-operator/Dockerfile
          push: false

  docker-go:
    # Mirrors docker-rust but builds the legacy Go images from archive/.
    # Stays green until Phase 9 retires the Go release line.
    runs-on: arc-runner-set
    steps:
      - name: Wait for Docker daemon (DinD sidecar)
        run: |
          echo "DOCKER_HOST=${DOCKER_HOST:-<unset>}"
          for i in $(seq 1 30); do
            if docker info >/dev/null 2>&1; then
              echo "docker daemon ready after ${i}s"
              docker version
              exit 0
            fi
            sleep 1
          done
          echo "docker daemon did not become ready"
          docker info || true
          exit 1

      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Build broker image (go, no push)
        uses: docker/build-push-action@v7
        with:
          context: archive
          file: archive/Dockerfile
          push: false

      - name: Build operator image (go, no push)
        uses: docker/build-push-action@v7
        with:
          context: archive
          file: archive/Dockerfile.operator
          push: false

  helm:
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
        with:
          version: 'v3.14.0'
      - name: helm lint
        run: helm lint deploy/helm/skafka
      - name: helm template (default flavor)
        run: helm template test-release deploy/helm/skafka > /tmp/rendered.yaml
      # Both branches of the image.flavor helper stay lint-green
      # (Phase 9, gh #152): default renders one flavor, this renders
      # the other, and a bogus flavor must fail the render.
      - name: helm template (rust flavor)
        run: helm template test-release deploy/helm/skafka --set image.flavor=rust > /tmp/rendered-rust.yaml
      - name: helm template (bad flavor fails)
        run: |
          if helm template test-release deploy/helm/skafka --set image.flavor=zig > /dev/null 2>&1; then
            echo "expected render to fail for image.flavor=zig" >&2
            exit 1
          fi
