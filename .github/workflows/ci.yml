name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8

      - name: go test
        run: go test ./...

      - name: Install controller-gen
        run: go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.20.1

      # Invoke controller-gen directly; `make` is not in the default ARC runner image.
      - name: Check CRD manifests are up to date
        run: |
          "$(go env GOPATH)/bin/controller-gen" \
            crd paths="./operator/api/..." \
            output:crd:artifacts:config=deploy/crds
          git diff --exit-code -- deploy/crds/

  docker:
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4
      # ARC runners use containerMode: dind — a privileged DinD sidecar provides
      # the Docker daemon. The docker-container buildx driver runs buildkit
      # inside that daemon.
      - uses: docker/setup-buildx-action@v3
        with:
          install: true
          driver: docker-container

      - name: Build broker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build operator image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.operator
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'
      - name: helm lint
        run: helm lint deploy/helm/skafka
      - name: helm template
        run: helm template test-release deploy/helm/skafka > /tmp/rendered.yaml
