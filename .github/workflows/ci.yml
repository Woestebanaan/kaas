name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Explicit least-privilege permissions. Override per-job if a step needs more.
permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8

      - name: go test
        run: go test ./...

      - name: Install controller-gen
        run: go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.20.1

      # Invoke controller-gen directly instead of `make manifests` — `make` is
      # not guaranteed to be installed on ARC runner images.
      - name: Check CRD manifests are up to date
        run: |
          "$(go env GOPATH)/bin/controller-gen" \
            crd paths="./operator/api/..." \
            output:crd:artifacts:config=deploy/crds
          git diff --exit-code -- deploy/crds/

  docker:
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4
      # docker-container driver pulls a buildkit image; works inside ARC pods
      # without needing a docker-in-docker sidecar.
      - uses: docker/setup-buildx-action@v3
        with:
          install: true
          driver: docker-container

      - name: Build broker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          # type=inline embeds the cache manifest in the image; portable and
          # does not require GHA cache env vars (often absent on ARC).
          cache-from: type=inline
          cache-to: type=inline,mode=max

      - name: Build operator image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.operator
          push: false
          cache-from: type=inline
          cache-to: type=inline,mode=max

  helm:
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'
      - name: helm lint
        run: helm lint deploy/helm/skafka
      - name: helm template
        run: helm template test-release deploy/helm/skafka > /tmp/rendered.yaml
