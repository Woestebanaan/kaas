name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    runs-on: arc-runner-set
    steps:
      - name: Runner preflight
        run: |
          echo "--- uname ---"; uname -a
          echo "--- user ---"; id
          echo "--- C toolchain ---"
          for t in cc gcc clang ld pkg-config make; do
            if command -v "$t" >/dev/null; then echo "$t: $(command -v $t)"
            else echo "$t: MISSING"; fi
          done

      - name: Install C toolchain (cc + libc + linker needed by cargo build scripts)
        # The ARC runner image is minimal — Rust build scripts for crates like
        # `rustix`, `libc`, `ring`, `anyhow` need a working `cc` + linker.
        # Phase 0's `.cargo/config.toml` tried `linker = "clang"` (later
        # removed); CI has been red since because no C toolchain was ever
        # installed on the runner. Install one here so the toolchain is
        # self-contained in the workflow rather than coupled to the runner image.
        run: |
          if command -v apt-get >/dev/null; then
            if [ "$(id -u)" -eq 0 ]; then SUDO=""; else SUDO="sudo"; fi
            $SUDO apt-get update
            $SUDO apt-get install -y --no-install-recommends \
              gcc libc6-dev pkg-config ca-certificates
          else
            echo "::warning::apt-get not available; assuming runner image already has cc/gcc"
          fi
          echo "cc → $(command -v cc || echo MISSING)"

      - uses: actions/checkout@v6

      - name: Install Rust toolchain (honours rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-features

      - name: cargo build --release
        run: cargo build --release --workspace --bins

      # Regenerates the CRDs from crates/sk-operator-api and fails on
      # any diff against deploy/crds + deploy/helm/kaas/crds. This
      # step was documented as existing since Phase 7 but never
      # actually wired — which is how the committed CRDs kept a stale
      # snake_case Condition schema while the Rust type moved to
      # camelCase, and every operator status write 500'd against SSA
      # validation (found live in phase 9, gh #152).
      - name: CRD drift gate
        run: cargo xtask check-crd-drift

      # Regenerates docs/src/compat/api-matrix.md from the codec
      # registry and fails on any diff, then scans every book page for
      # crates/… bins/… source citations that don't resolve. Keeps the
      # book's compatibility claims pinned to the actual wire surface.
      - name: Docs drift gate
        run: cargo xtask check-docs-drift

  docker:
    runs-on: arc-runner-set
    steps:
      - name: Wait for Docker daemon (DinD sidecar)
        run: |
          echo "DOCKER_HOST=${DOCKER_HOST:-<unset>}"
          for i in $(seq 1 30); do
            if docker info >/dev/null 2>&1; then
              echo "docker daemon ready after ${i}s"
              docker version
              exit 0
            fi
            sleep 1
          done
          echo "docker daemon did not become ready"
          docker info || true
          exit 1

      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Build broker image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bins/kaas/Dockerfile
          push: false

      - name: Build operator image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bins/kaas-operator/Dockerfile
          push: false

  helm:
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
        with:
          version: 'v3.14.0'
      - name: helm lint
        run: helm lint deploy/helm/kaas
      - name: helm template
        run: helm template test-release deploy/helm/kaas > /tmp/rendered.yaml

  docs:
    runs-on: arc-runner-set
    env:
      # mdbook stays on 0.4.x: mdbook-linkcheck 0.7.7 and
      # mdbook-mermaid >= 0.17.0 target different mdbook major lines
      # (0.17.0 is built against the mdbook 0.5 preprocessor protocol
      # and fails against 0.4 — verified 2026-07-19), so 0.16.2 is the
      # newest mermaid preprocessor that works here. Bump all three
      # together when moving to mdbook 0.5.
      MDBOOK_VERSION: v0.4.52
      MDBOOK_MERMAID_VERSION: v0.16.2
      MDBOOK_LINKCHECK_VERSION: v0.7.7
    steps:
      - name: Install curl + unzip (minimal runner image)
        # Same caveat as the `rust` job: the ARC runner image is bare.
        # Pinned release binaries via curl beat `cargo install` by
        # minutes on a cold runner.
        run: |
          if command -v apt-get >/dev/null; then
            if [ "$(id -u)" -eq 0 ]; then SUDO=""; else SUDO="sudo"; fi
            $SUDO apt-get update
            $SUDO apt-get install -y --no-install-recommends \
              curl ca-certificates unzip
          fi

      - uses: actions/checkout@v6

      - name: Install mdbook + mdbook-mermaid + mdbook-linkcheck (pinned)
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_VERSION}/mdbook-${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          curl -sSL "https://github.com/badboy/mdbook-mermaid/releases/download/${MDBOOK_MERMAID_VERSION}/mdbook-mermaid-${MDBOOK_MERMAID_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          curl -sSL -o /tmp/mdbook-linkcheck.zip \
            "https://github.com/Michael-F-Bryan/mdbook-linkcheck/releases/download/${MDBOOK_LINKCHECK_VERSION}/mdbook-linkcheck.x86_64-unknown-linux-gnu.zip"
          unzip -o -d "$HOME/.local/bin" /tmp/mdbook-linkcheck.zip mdbook-linkcheck
          chmod +x "$HOME/.local/bin/mdbook-linkcheck"

      - name: mdbook build (html + linkcheck backends)
        run: mdbook build docs
