name: Docs Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a superseded push just skips to the newest.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: arc-runner-set
    env:
      # Keep in lockstep with the `docs` job in ci.yml — same pins,
      # same 0.4.x-line caveat (mdbook-mermaid >= 0.17 targets mdbook
      # 0.5; bump all three together).
      MDBOOK_VERSION: v0.4.52
      MDBOOK_MERMAID_VERSION: v0.16.2
      MDBOOK_LINKCHECK_VERSION: v0.7.7
    steps:
      - name: Install curl + unzip (minimal runner image)
        run: |
          if command -v apt-get >/dev/null; then
            if [ "$(id -u)" -eq 0 ]; then SUDO=""; else SUDO="sudo"; fi
            $SUDO apt-get update
            $SUDO apt-get install -y --no-install-recommends \
              curl ca-certificates unzip
          fi

      - uses: actions/checkout@v6

      - name: Install mdbook + mdbook-mermaid + mdbook-linkcheck (pinned)
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_VERSION}/mdbook-${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          curl -sSL "https://github.com/badboy/mdbook-mermaid/releases/download/${MDBOOK_MERMAID_VERSION}/mdbook-mermaid-${MDBOOK_MERMAID_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          curl -sSL -o /tmp/mdbook-linkcheck.zip \
            "https://github.com/Michael-F-Bryan/mdbook-linkcheck/releases/download/${MDBOOK_LINKCHECK_VERSION}/mdbook-linkcheck.x86_64-unknown-linux-gnu.zip"
          unzip -o -d "$HOME/.local/bin" /tmp/mdbook-linkcheck.zip mdbook-linkcheck
          chmod +x "$HOME/.local/bin/mdbook-linkcheck"

      - name: mdbook build
        run: mdbook build docs

      # Site layout: the custom landing page owns the root, the book lives
      # under /book/ (the landing page's cards link to book/…).
      - name: Assemble site (landing page + book)
        run: |
          rm -rf _site
          mkdir _site
          cp -r docs/landing/. _site/
          test -f _site/index.html   # the landing page must own the root
          cp -r docs/book/html _site/book

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: arc-runner-set
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
