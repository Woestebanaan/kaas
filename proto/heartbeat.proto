syntax = "proto3";

// Package heartbeat is the v3 cluster-coordination protocol between brokers
// and the elected controller. Bidirectional gRPC: brokers stream BrokerStatus
// upstream every ~1s; the controller streams ControllerCommand back, sending
// PING for liveness and ASSIGNMENT_CHANGED to push assignment.json refreshes.
//
// Phase 4 wires the client/server. Phase 1 only ships this schema.
package kaas.heartbeat.v1;


service ControllerHeartbeat {
  // Stream is opened by the broker. Long-lived; reconnect on disconnect.
  rpc Stream(stream BrokerStatus) returns (stream ControllerCommand);
}

// BrokerStatus is sent upstream from broker to controller every
// heartbeatIntervalMs (default 1000ms).
message BrokerStatus {
  string broker_id = 1;
  int64  timestamp_ms = 2;

  // Highest assignmentVersion the broker has applied. Lets the controller
  // detect brokers that missed an ASSIGNMENT_CHANGED push and re-deliver.
  uint64 last_seen_assignment_version = 3;

  repeated PartitionStatus partitions = 4;

  // Consumer groups this broker is currently coordinating (group state
  // loaded, members joined, offsets cached). Phase 5: the controller
  // aggregates active_groups across all brokers to build the GroupSource
  // for assignment computation. Brokers populate this from the Manager's
  // in-memory group set.
  repeated string active_groups = 5;

  // gh #208: is this broker's request-processing (main) runtime live?
  // Bumped from a 1s tick task ON THE MAIN RUNTIME, so it goes false
  // when every main worker is wedged (e.g. a synchronous NFS scan
  // pinning both workers under a 2-CPU limit). The controller uses this
  // as the liveness input to its alive-broker set instead of pod
  // EndpointSlice readiness: a broker whose main runtime is dead must
  // have its partitions reassigned even though its heartbeat — which
  // runs on a separate control-plane runtime — is still connected.
  //
  // Distinct from "serving": a healthy booting broker reports
  // healthy=true while it is still taking over (so it stays assignable),
  // whereas a wedged broker reports healthy=false. Proto3 default is
  // false, which is the safe reading for an old client that never sets
  // it (treated as not-alive → its partitions move).
  bool healthy = 6;
}

message PartitionStatus {
  string topic = 1;
  int32  partition = 2;
  uint32 epoch = 3;

  enum State {
    READY = 0;
    RECOVERING = 1;
    ERROR = 2;
  }
  State state = 4;
  int64 high_watermark = 5;
}

// ControllerCommand is pushed downstream from controller to broker.
message ControllerCommand {
  int64 timestamp_ms = 1;

  enum Type {
    PING = 0;                // standard heartbeat, refresh broker liveness
    LEAVING = 1;             // controller shutting down gracefully
    ASSIGNMENT_CHANGED = 2;  // re-read /data/__cluster/assignment.json now
  }
  Type type = 2;

  // Populated when type == ASSIGNMENT_CHANGED.
  uint64 assignment_version = 3;

  // Echo of the most recent BrokerStatus.timestamp_ms the controller
  // received from this broker. The broker computes RTT as
  // (now - broker_status_timestamp_ms) for the heartbeat metrics — proves
  // the round-trip succeeded and surfaces controller-side latency.
  // Zero when the controller has not yet received a BrokerStatus on this
  // stream (first PING after stream open).
  int64 broker_status_timestamp_ms = 4;
}
